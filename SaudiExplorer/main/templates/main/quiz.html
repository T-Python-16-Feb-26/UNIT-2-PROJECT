{% extends 'main/base.html' %}
{% load static %}

{% block title %}Quiz — Ghosn{% endblock %}

{% block content %}

<section class="page-hero">
      <span class="page-hero-icon">🧠</span>
      <h1 class="page-hero-title">Test Your <span>Knowledge</span></h1>
      <p class="page-hero-subtitle">How well do you know Saudi Arabian agriculture? Take our interactive quiz and find out!</p>
    </section>

    <div class="quiz-wrapper">
      <div class="quiz-progress-bar">
        <div class="quiz-progress-fill" id="progressFill" style="width: 0%"></div>
      </div>

      <div class="quiz-card" id="quizCard">
        <!-- Quiz content injected by JS -->
      </div>
    </div>

    {% block extra_scripts %}
<script src="{% static 'js/quiz.js' %}"></script>
{% endblock %}


{% endblock %}
