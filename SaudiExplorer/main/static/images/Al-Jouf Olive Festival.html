s or liabilities related to claims resulting from for the user's violation of the terms or conditions of use or other relevant regulations inside and outside the Kingdom of Saudi Arabia.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e\u0026nbsp;\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eCopyright Notice\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003eThis portal is subject to the supervision of the Saudi Press Agency, a government agency \"The Saudi Press Agency (SPA), established in 1971, is a prime reference for those interested in local news and events. The agency provides accurate and real-time media content in several languages. It operates ​​according to professional best practices and makes use of the latest effective communication techniques. SPA seeks to be an influential voice of the Kingdom of Saudi Arabia in the Arab and Islamic worlds, as well as globally.\".\u003c/p\u003e\n\u003cp\u003eAll content available on the Saudi Press Agency's electronic portal is protected by national rules and regulations related to publications, trade names and intellectual property rights. All intellectual property rights related to the content of the portal are protected and are considered the property of the Saudi Press Agency.\u003c/p\u003e\n\u003cp\u003eUnless otherwise stated, users are not permitted to sell, license, rent, modify, copy, reproduce, download, publish, transmit, distribute or edit any materials derived explicitly from the content of this portal without the prior written consent of the Saudi Press Agency.\u003c/p\u003e\n\u003cp\u003eIt is prohibited to change or modify any of the content of the portal. In addition, all images and media included in the portal are protected by copyright. No copying or use of this content is permitted without the prior written consent of the Saudi Press Agency.\u003c/p\u003e\n\u003cp\u003e\u0026nbsp;\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eJurisdiction:\u003c/strong\u003e Users hereby agree to submit exclusively to the jurisdiction of the Kingdom of Saudi Arabia regarding any issue or dispute arising from the use of this portal.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e\u0026nbsp;\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003ePrivacy and Data Protection Policy Updates\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003eThe Saudi Press Agency has the right to update and change its Privacy and Data Protection Policy as needed. We will update this policy when our data and information processing practices change.\u003c/p\u003e\n\u003cp\u003e\u0026nbsp;\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eContact Us\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003eIf you have any questions about our Privacy and Data Protection Policy, or if you need assistance, or a complaint, please let us know by visiting the \u003ca href=\"https://www.spa.gov.sa/en/contact-us\"\u003eContact Us page\u003c/a\u003e.\u003c/p\u003e\n\u003cp\u003e\u0026nbsp;\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003ePersonal Data Protection Regulations\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://laws.boe.gov.sa/boelaws/laws/lawdetails/b7cfae89-828e-4994-b167-adaa00e37188/1\"\u003ePersonal Data Protection Law.\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://sdaia.gov.sa/ndmo/Files/PoliciesEn001.pdf\"\u003eNational Data Management and Personal Data Protection Standards.\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://sdaia.gov.sa/ndmo/Files/PoliciesEn.pdf\"\u003eInterim National Data Governance Regulations.\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/25df73d6-0f49-4dc5-b010-a9a700f2ec1d/2\"\u003eAnti-Crime Law Electronic.\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://sdaia.gov.sa/ar/SDAIA/about/Documents/Children%20and%20Incompetents%E2%80%99%20Data%20Protection%20Policy.pdf\"\u003eChildren and incompetent privacy protection policy.\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://sdaia.gov.sa/Documents/RegulationonPersonalDataEN.pdf\"\u003eGeneral rules for transferring personal data outside the Kingdom.\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u0026nbsp;\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eOther relevant legislation and regulations\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://sdaia.gov.sa/en/SDAIA/about/Documents/Personal%20Data%20English%20V2-23April2023-%20Reviewed-.pdf\"\u003ePersonal Data Protection Policy\u003c/a\u003e: Saudi Data and Artificial Intelligence Authority\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://cert.gov.sa/en/awareness/%D8%A7%D9%84%D8%B6%D9%88%D8%A7%D8%A8%D8%B7-%D8%A7%D9%84%D8%A3%D8%B3%D8%A7%D8%B3%D9%8A%D8%A9-%D9%84%D9%84%D8%A3%D9%85%D9%86-%D8%A7%D9%84%D8%B3%D9%8A%D8%A8%D8%B1%D8%A7%D9%86%D9%8A/\"\u003eBasic Cybersecurity Controls\u003c/a\u003e: National Cybersecurity Authority\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u0026nbsp;\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eChildren and Incompetents Privacy Protection Policy\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003eDefines\u0026nbsp;\u003ca href=\"https://sdaia.gov.sa/ar/SDAIA/about/Documents/Children%20and%20Incompetents%E2%80%99%20Data%20Protection%20Policy.pdf\"\u003eChildren and Incompetent Privacy Protection Policy\u003c/a\u003e\u0026nbsp;The legal basis for preserving children and protecting their rights regarding the collection and processing of their personal data by any means. The policy is in line with the provisions of the Data Protection Regulation and the United Nations Convention on the Rights of the Child and its optional protocols. The objectives are to protect children from:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eThe negative effects of inappropriate content and advertisements spread on the Internet.\u003c/li\u003e\n\u003cli\u003eAssisting the competent authorities in protecting children from potential risks - violence, abuse, mistreatment, threats, harm or exploitation, resulting from the collection and processing of their personal data through websites and digital applications.\u003c/li\u003e\n\u003cli\u003eFinding a balance between the negative effects, potential risks and the need to collect and process children's personal data.\u003c/li\u003e\n\u003cli\u003eThe provisions of the policy apply to all entities (public, private and non-profit) in the Kingdom that collect and process children's personal data, whether manually or electronically. The provisions also apply to all entities outside the Kingdom that collect personal data of children residing in the Kingdom via the Internet.\u003c/li\u003e\n\u003cli\u003eGeneral Rules for Transferring Personal Data Outside the Kingdom\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u0026nbsp;\u003c/p\u003e\n\u003cp\u003eThe\u0026nbsp;\u003ca href=\"https://sdaia.gov.sa/Documents/RegulationonPersonalDataEN.pdf\"\u003eGeneral Rules for Transferring Personal Data Outside the Kingdom\u003c/a\u003e\u0026nbsp;sets the rules and standards for transferring personal data outside the geographical borders of the Kingdom to ensure the preservation of national sovereignty over such data, as well as preserving the privacy of personal data owners and protecting their rights by specifying the obligations of controllers and processors regarding the transfer of personal data outside the Kingdom. The provisions of this document apply to all entities (public, private and non-profit) in the Kingdom that transfer personal data to other parties outside the geographical borders of the Kingdom for the purpose of processing.\u003c/p\u003e","king_bio_en":"\u003ch4 id=\"h4NewsTitle\" class=\"cv-title\"\u003eBiography of Custodian of the Two Holy Mosques King Salman bin Abdulaziz Al Saud\u003c/h4\u003e\n\u003cp id=\"pText\" class=\"cv-intro\"\u003eCustodian of the Two Holy Mosques King Salman bin Abdulaziz Al Saud was pledged allegiance as the King of the Kingdom of Saudi Arabia on 3, Rabi II, 1436H corresponding to 23, January, 2015. King Salman spent more than two and half years as the Crown Prince and Deputy Premier due to the Royal order issued on 18, June, 2012 and remained in his post as the Defense Minister based on the Royal order issued 5, November, 2011. King Salman served as Governor of Riyadh Region for more than 50 years.\u003c/p\u003e\n\u003cp class=\"cv-intro\"\u003e\u0026nbsp;\u003c/p\u003e\n\u003cdiv class=\"cv-row-l\"\u003e\n\u003cp\u003eKing Salman bin Abdulaziz Al Saud was born on 15, Shawwal, 1354H corresponding to 31, December, 1935 in Riyadh. He is the 25th son of the Kingdom of Saudi Arabia's founder late King Abdulaziz Al Saud.\u003c/p\u003e\n\u003cp\u003eCustodian of the Two Holy Mosques King Salman bin Abdulaziz Al Saud grew up with his brothers at the Royal Palace in Riyadh where he accompanied his father in official meetings with the Kings and presidents of the world.\u003c/p\u003e\n\u003cdiv class=\"page-header\"\u003e\n\u003ch3\u003eEducation\u003c/h3\u003e\n\u003c/div\u003e\n\u003cp\u003eCustodian of the Two Holy Mosques King Salman bin Abdulaziz Al Saud started his early education at the school of princes in Riyadh where he learned the religious lessons and modern sciences. King Salman finished memorization of the Holy Quran at the age of ten while he was attending the lessons delivered by Sheikh Abdullah Khayat, Imam and Preacher of the Grand Mosque. \u003cbr /\u003eKing Salman bin Abdulaziz has expressed his interest in sciences and later, he received numerous honorary academic certificates and awards, including: \u003cbr /\u003e- Honorary Doctorate from Islamic University in Madina. \u003cbr /\u003e- Honorary Doctorate of Literature from Umm Al Qura University in Makkah. \u003cbr /\u003e- Honorary Doctorate from Milia Islamia University in Delhi in recognition for his humanitarian efforts and charitable commitment to support education and his distinctiveness as a statesman. \u003cbr /\u003e- Honorary doctorate in law from Waseda University in Japan, in recognition of his outstanding contributions in the Kingdom and the world. \u003cbr /\u003e- \"Kent\" Medal for Sciences and Humanities, from Berlin-Brandenburg Academy in recognition of his contributions to science.\u003c/p\u003e\n\u003c/div\u003e\n\u003cdiv class=\"cv-row-l\"\u003e\n\u003cdiv class=\"page-header\"\u003e\n\u003ch3\u003eGovernor of Riyadh\u003c/h3\u003e\n\u003c/div\u003e\n\u003cfigure class=\"ArticleCvImage\"\u003e\u003cimg src=\"https://www.spa.gov.sa/include/images/king3.jpg\" alt=\"1\" /\u003e\u003c/figure\u003e\n\u003cp\u003eCustodian of the Two Holy Mosques King Salman bin Abdulaziz was appointed as the Governor of Riyadh Region, which is one of the biggest regions and capital of the Kingdom of Saudi Arabia, in an important phase of this city\u0026rsquo;s history. King Salman was appointed as Acting Governor of Riyadh Region at age of 19 on 11, Rajab, 1373 corresponding to 16, March, 1954. After a year, he was appointed as the Governor of Riyadh Region at the rank of minister on 25, Sha'ban, 1374 corresponding to 18, April, 1955. At Government Palace in Riyadh, King Salman practiced his duties as the Governor of Riyadh Region.\u003c/p\u003e\n\u003cp\u003eKing Salman has served as the Governor of Riyadh Region for more than five decades where he supervised the big transfer of Riyadh from a mid-sized town with a population of 200,000 people into one of the fastest growing capital in the Arab World with more than 5,000,000 people. King Salman faced many challenges in supporting development and growth march, but he proved with his high competence to carry out achievements and initiatives where the Saudi capital becomes today one of the richest cities in the region and regional center for travel and trade.\u003c/p\u003e\n\u003cp\u003eDuring King Salman\u0026rsquo;s period as the Governor of Riyadh Region, Riyadh witnessed many achievements in the infrastructure projects, including highways, schools, hospitals, universities, museums, sports stadiums and preparation of Riyadh Metro project. Riyadh included many prominent architectural landmarks.\u003c/p\u003e\n\u003cdiv class=\"page-header\"\u003e\n\u003ch3\u003eMinister of Defense\u003c/h3\u003e\n\u003c/div\u003e\nOn November, 2011, Prince Salman bin Abdulaziz was appointed as Minister of Defense of the Kingdom of Saudi Arabia which includes land, air and naval forces and air defense. During his era, the Ministry of Defense witnessed an inclusive development in the whole sectors of the Ministry in training and arming. He also successfully supervised the largest military drill in the history of the Saudi armed forces (Abdullah Sword).\u003c/div\u003e\n\u003cdiv class=\"cv-row-l\"\u003e\n\u003cdiv class=\"page-header\"\u003e\n\u003ch3\u003eOther Posts, Contributions\u003c/h3\u003e\n\u003c/div\u003e\n\u003cfigure class=\"ArticleCvImage\"\u003e\u003cimg src=\"https://www.spa.gov.sa/include/images/king4.jpg\" alt=\"1\" /\u003e\u003c/figure\u003e\n\u003cp\u003eIn addition to his post as the Governor of Riyadh Region, King Salman bin Abdulaziz assumed many important posts in the Kingdom of Saudi Arabia, including:\u003c/p\u003e\n\u003cp\u003e\u0026bull; Chairman of High Commission for the Development of Riyadh.\u003c/p\u003e\n\u003cp\u003e\u0026bull; Chairman of High Commission for the Development of Al-Diriyah.\u003c/p\u003e\n\u003cp\u003e\u0026bull; President of Council of Trustees of King Fahad National Library.\u003c/p\u003e\n\u003cp\u003e\u0026bull; Chairman of King Abdulaziz Foundation.\u003c/p\u003e\n\u003cp\u003e\u0026bull; Secretary General of King Abdulaziz Islamic Foundation.\u003c/p\u003e\n\u003cp\u003e\u0026bull; Honorary President of Prince Salman Social Center.\u003c/p\u003e\n\u003cp\u003e\u0026bull; Chairman of the Board of Directors of Riyadh Charitable Foundation for Science, including Prince Sultan University and Prince Salman Science Oasis.\u003c/p\u003e\n\u003cp\u003e\u0026bull; Honorary Chairman of the Board of Directors of the Friends Committee of Patients in Riyadh.\u003c/p\u003e\n\u003cp\u003e\u0026bull; Chairman of the Board of Trustees of the Abdulaziz bin Baz Charity.\u003c/p\u003e\n\u003cp\u003e\u0026bull; Honorary Chairman of the Board of Directors of the Abdulaziz bin Baz Charity.\u003c/p\u003e\n\u003cp\u003e\u0026bull; Chairman of the Board of Directors of Prince Salman Charitable Housing.\u003c/p\u003e\n\u003cp\u003e\u0026bull; Chairman of the Board of Directors of Charitable Society for Orphans in Riyadh Region.\u003c/p\u003e\n\u003c/div\u003e\n\u003cdiv class=\"cv-row-l\"\u003e\n\u003cdiv class=\"page-header\"\u003e\n\u003ch3\u003eCharitable Works\u003c/h3\u003e\n\u003c/div\u003e\n\u003cfigure class=\"ArticleCvImage\"\u003e\u003cimg src=\"https://www.spa.gov.sa/include/images/king5.jpg\" alt=\"1\" /\u003e\u003c/figure\u003e\n\u003cp\u003eKing Salman is well- known for his charitable works and efforts. He is the President of the Assembly of Prince Salman Center for Disability Research, Honorary President of the Assembly of Prince Fahd bin Salman for Patients with Kidney Failure, Honorary President of the Saudi Center for Organ Transplantation and many other associations.\u003c/p\u003e\n\u003cp\u003eSince 1956, King Salman assumed the presidency of many humanitarian and service committees which took over the relief and aid responsibilities of supporting many of the stricken regions around the world, whether the regions affected by war or natural disasters. Custodian of the Two Holy Mosques King Salman bin Abdulaziz won many medals due to his humanitarian efforts from Bahrain, Bosnia and Herzegovina, France, Morocco, Palestine, Philippine, Senegal, United Nations and Yemen. .\u003c/p\u003e\n\u003cdiv class=\"page-header\"\u003e\n\u003ch3\u003eAssociations and Organizations Abroard Activities Chaired by King Salman:\u003c/h3\u003e\n\u003c/div\u003e\n\u003cp\u003e\u0026bull; Chairman of the Committee to donate to the victims of Suez in 1956.\u003c/p\u003e\n\u003cp\u003e\u0026bull; Head of the Main Committee to Collect Funds for Algeria in 1956.\u003c/p\u003e\n\u003cp\u003e\u0026bull; Chairman of the People's Committee to Help the Families of the Martyrs of Jordan in 1967.\u003c/p\u003e\n\u003cp\u003e\u0026bull; Chairman of the People's Committee to Help the Palestinian People.\u003c/p\u003e\n\u003cp\u003e\u0026bull; Chairman of the People's Committee for the Relief of the Victims of Pakistan in 1973.\u003c/p\u003e\n\u003cp\u003e\u0026bull; Chairman of the People's Committee to support the War Effort in Egypt in 1973.\u003c/p\u003e\n\u003cp\u003e\u0026bull; Chairman of the People's Committee to Support the War Effort in Syria in 1973.\u003c/p\u003e\n\u003cp\u003e\u0026bull; Chairman of the Committee for the Relief of Local Victims of the Floods in Sudan in 1988.\u003c/p\u003e\n\u003cp\u003e\u0026bull; Chairman of the Local Committee to Provide Aid and Shelter to Kuwaiti Nationals Following the Iraqi Invasion of Kuwait in 1990.\u003c/p\u003e\n\u003cp\u003e\u0026bull; Chairman of the Local Committee to Receive Donations for Those Affected by Floods in Bangladesh in 1991.\u003c/p\u003e\n\u003cp\u003e\u0026bull; Chairman of the High Commission to Collect Donations for Bosnia and Herzegovina in 1992.\u003c/p\u003e\n\u003cp\u003e\u0026bull; Chairman of the Kingdom's Exhibition between Yesterday and Today which is Held in a Number of Arab and European Countries, the United States and Canada during the period in 1985/1992.\u003c/p\u003e\n\u003cp\u003e\u0026bull; Chairman of the Supreme Committee to Collect Funds for Al-Quds Uprising in Riyadh in 2000.\u003c/p\u003e\n\u003c/div\u003e\n\u003cdiv class=\"cv-row-l\"\u003e\n\u003cdiv class=\"page-header\"\u003e\n\u003ch3\u003eMedals\u003c/h3\u003e\n\u003c/div\u003e\n\u003cp\u003eCustodian of the Two Holy Mosques King Salman bin Abdulaziz Holds King Abdulaziz Scarf of the First Class which is considered the highest medal in the Kingdom of Saudi Arabia. He also won many medals such as:\u003c/p\u003e\n\u003cp\u003e\u0026bull; A medal on the occasion of two thousand years after establishing the city of Paris awarded him the medal by President Jacques Chirac in\u003c/p\u003e\n\u003cp\u003e\u0026bull; Paris in 1985.\u003c/p\u003e\n\u003cp\u003e\u0026bull; A medal of intellectual efficiency, where he was decorated by the King of Morocco Hassan II in Casablanca in 1989.\u003c/p\u003e\n\u003cp\u003e\u0026bull; Award of Disabled Children Association in the Kingdom Saudi Arabia for the humanitarian service.\u003c/p\u003e\n\u003cp\u003e\u0026bull; Golden medal of Bosnia and Herzegovina for his support and his efforts to liberate Bosnia and Herzegovina.\u003c/p\u003e\n\u003cp\u003e\u0026bull; The Bosnian medal for Islamic benevolence of the first class for his effort in supporting Islam and Muslims in Bosnia and Herzegovina.\u003c/p\u003e\n\u003cp\u003e\u0026bull; The United Nations shield to reduce the effects of poverty in the world.\u003c/p\u003e\n\u003cp\u003e\u0026bull; Al-Quds Star medal in appreciation to his extraordinary works which stress the sacrifice and courage in serving the Palestinian people.\u003c/p\u003e\n\u003cp\u003e\u0026bull; Sktona Medal which is Considered the highest decoration in the Republic of the Philippines in appreciation of his active contributions in the humanitarian activities and supporting the charitable associations in addition to his efforts in upgrading and improving the definition of the Islamic Culture.\u003c/p\u003e\n\u003cp\u003e\u0026bull; The Greatest and highest medal in the Republic of Senegal.\u003c/p\u003e\n\u003cp\u003e\u0026bull; Baden Powell Fellowship granted by King of Sweden Carl XVI Gustaf.\u003c/p\u003e\n\u003cp\u003e\u0026bull; Bahrain award for humanitarian work for the Gulf Cooperation Council.\u003c/p\u003e\n\u003cp\u003e\u0026bull; Award of the International Special Olympics in Middle East and North Africa which is considered the highest award for his efforts in serving disabled people in the Kingdom and encouraging scientific research in disability field.\u003c/p\u003e\n\u003c/div\u003e","king_bio_ar":"\u003cdiv class=\"cv-row-l\"\u003e\n\u003cdiv class=\"page-header\"\u003e\n\u003cdiv class=\"page-header\"\u003e\n\u003cdiv class=\"page-header\"\u003e\n\u003cdiv class=\"page-header\"\u003e\n\u003cdiv class=\"cv-row-l\"\u003e\n\u003ch2 id=\"h4NewsTitle\" class=\"cv-title\"\u003eالسيرة الذاتية لخادم الحرمين الشريفين الملك سلمان بن عبدالعزيز آل سعود\u003c/h2\u003e\n\u003ch4 style=\"text-align: right;\"\u003e\u0026nbsp;تمت مبايعة خادم الحرمين الشريفين الملك سلمان بن عبدالعزيز آل سعود -حفظه الله-، ملكًا للمملكة العربية السعودية، في 3 ربيع الآخر 1436هـ الموافق 23 يناير 2015م.\u003cbr /\u003eوكان الملك سلمان بن عبدالعزيز \u0026nbsp;- رعاه الله - قد قضى أكثر من عامين ونصف العام وليًا للعهد ونائبًا لرئيس مجلس الوزراء؛ إثر تعيينه في 18 يونيو 2012م بأمر ملكي كما بقي حينها في منصبه وزيرًا للدفاع،\u0026nbsp;\u003cbr /\u003eوهو المنصب الذي عُيّن عليه في 5 نوفمبر 2011م، قبل ذلك كان الملك سلمان أميرًا لمنطقة الرياض لأكثر من خمسين عامًا\u003c/h4\u003e\n\u003cdiv class=\"cv-row-l\"\u003e\n\u003ch3\u003eالنشأة والولادة\u003c/h3\u003e\n\u003ch4\u003eوُلد سلمان بن عبدالعزيز آل سعود في الخامس من شهر شوال سنة 1354هـ الموافق 31 ديسمبر 1935م في الرياض، وهو الابن الخامس والعشرون لمؤسس المملكة العربية السعودية الملك عبدالعزيز آل سعود \u0026ndash; رحمه الله -.\u003cbr /\u003eنشأ خادم الحرمين الشريفين مع إخوانه في القصر الملكي في الرياض، حيث كان يرافق والده في اللقاءات الرسمية مع ملوك وحكام العالم.\u003c/h4\u003e\n\u003ch3\u003eالتعليم\u003c/h3\u003e\n\u003ch4\u003eتلقى خادم الحرمين الشريفين الملك سلمان بن عبدالعزيز آل سعود تعليمه المبكر في مدرسة الأمراء بالرياض، حيث درس فيها العلوم الدينية والعلوم الحديثة، وختم القرآن الكريم كاملاً، وهو في سن العاشرة على يد إمام وخطيب المسجد الحرام الشيخ عبدالله خياط ـ رحمه الله ـ.\u003cbr /\u003eوقد أبدى الملك سلمان بن عبد العزيز منذ الصغر اهتمامًا بالعلم، وحصل على العديد من الشهادات الفخرية والجوائز الأكاديمية.\u003c/h4\u003e\n\u003c/div\u003e\n\u003ch3\u003eإمارة الرياض\u003c/h3\u003e\n\u003cp\u003e\u003cimg class=\"fr-fic fr-dib fr-fir\" style=\"width: 1035px;\" src=\"https://clcdn.spa.gov.sa/galupload/otherfiles/2019-03/ff9fe0732b9645db290f56c956877c4011e16d08.jpg\" /\u003e\u003c/p\u003e\n\u003cp\u003e\u003cimg class=\"fr-fic fr-dib fr-fir\" style=\"width: 1033px;\" src=\"https://clcdn.spa.gov.sa/galupload/otherfiles/2019-03/900c4b7e88c37c0b9341024e33d064fb3f79c234.jpg\" /\u003e\u003c/p\u003e\n\u003cp\u003e\u003cimg class=\"fr-fic fr-dib fr-fir\" style=\"width: 1037px;\" src=\"https://clcdn.spa.gov.sa/galupload/otherfiles/2019-03/1da4d3558adb7acb5dfeacbb1b22475e72f87235.jpg\" /\u003e\u003c/p\u003e\n\u003ch4\u003eتولى خادم الحرمين الشريفين الملك سلمان بن عبدالعزيز آل سعود منصب أمير منطقة الرياض؛ إحدى أكبر مناطق المملكة العربية السعودية في المساحة والسكان وعاصمة الدولة في مرحلة مهمة من تاريخ هذه المدينة، حيث تم تعيينه بداية أميرًا لمنطقة الرياض بالنيابة، وهو في التاسعة عشرة من العمر بتاريخ 11 رجب 1373هـ الموافق 16 مارس 1954م وبعد عام واحد عُيّن -حفظه الله- حاكمًا لمنطقة الرياض، وأميرًا عليها برتبة وزير، وذلك بتاريخ 25 شعبان 1374هـ الموافق 18 أبريل 1955م.\u003cbr /\u003eواستمر أميرًا لمنطقة الرياض لأكثر من خمسة عقود، أشرف خلالها على عملية تحول المنطقة من بلدة متوسطة الحجم يسكنها حوالي 200 ألف نسمة إلى إحدى أسرع العواصم نموًا في العالم العربي اليوم.\u003cbr /\u003eولم تخلُ فترة النمو هذه من التحديات الصعبة التي ترافق مسيرة التنمية، لكنه أثبت قدرة عالية على المبادرة، وتحقيق الإنجازات، وباتت العاصمة السعودية اليوم إحدى أغنى المدن في المنطقة، ومركزًا إقليميًا للسفر والتجارة.\u003cbr /\u003eوقد شهدت الرياض خلال توليه الإمارة إنجاز العديد من مشاريع البنية التحتية الكبرى، مثل الطرق السريعة والحديثة، والمدارس، والمستشفيات، والجامعات، إلى جانب المتاحف والإستادات الرياضية ومدن الترفيه، وغيرها.\u003cbr /\u003eوتضم العاصمة السعودية الرياض عدداً من المعالم المعمارية البارزة، وهي تمتد على مساحة عمرانية تجعلها إحدى أكبر مدن العالم مساحة.\u003cbr /\u003e\u003cbr /\u003e\u003c/h4\u003e\n\u003ch3\u003eوزارة الدفاع\u003c/h3\u003e\n\u003ch4 class=\"page-header\"\u003eفي نوفمبر 2011م عُيّن صاحب السمو الملكي الأمير سلمان بن عبدالعزيز آل سعود وزيرًا للدفاع في المملكة العربية السعودية، وتشمل وزارة الدفاع: القوات البرية، والجوية، والبحرية، والدفاع الجوي.\u003cbr /\u003eوشهدت الوزارة في عهده تطويرًا شاملاً لقطاعات الوزارة كاملة في التدريب والتسليح.\u003c/h4\u003e\n\u003cp\u003e\u0026nbsp;\u003c/p\u003e\n\u003cbr /\u003e\n\u003cdiv class=\"page-header\"\u003e\u003cimg class=\"fr-fic fr-dib fr-fir\" style=\"width: 857px;\" src=\"https://clcdn.spa.gov.sa/galupload/otherfiles/2019-03/058970b944c5cd2207251366ce8ffc087cc6160d.jpg\" /\u003e\u003c/div\u003e\n\u003cp\u003e\u0026nbsp;\u003c/p\u003e\n\u003cdiv class=\"page-header\"\u003e\u003cimg class=\"fr-fic fr-dib fr-fir\" style=\"width: 851px;\" src=\"https://clcdn.spa.gov.sa/galupload/otherfiles/2019-03/ffdc8b5ada4e11413553f0a867d919ca88bdefbe.jpg\" /\u003e\u003c/div\u003e\n\u003cp\u003e\u0026nbsp;\u003c/p\u003e\n\u003cdiv class=\"page-header\"\u003e\u003cimg class=\"fr-fic fr-dib fr-fir\" style=\"width: 857px;\" src=\"https://clcdn.spa.gov.sa/galupload/otherfiles/2019-03/b204e837ce8fa7b5214db9fa123ca7f919ab5d3b.jpg\" /\u003e\u003c/div\u003e\n\u003cdiv class=\"page-header\"\u003e\n\u003cdiv class=\"page-header\"\u003e\u003cimg class=\"fr-fic fr-dib fr-fir\" style=\"width: 859px;\" src=\"https://clcdn.spa.gov.sa/galupload/otherfiles/2019-03/82f4151bdd1676223821cf4d45259b45443a5b32.jpg\" /\u003e\u003c/div\u003e\n\u003cdiv class=\"page-header\"\u003e\n\u003cdiv class=\"page-header\"\u003e\u003cimg class=\"fr-fic fr-dib fr-fir\" style=\"width: 858px;\" src=\"https://clcdn.spa.gov.sa/galupload/otherfiles/2019-03/2f2e41b9bcf28d3451386e531dc2a1b5c1058e01.jpg\" /\u003e\u003c/div\u003e\n\u003cdiv class=\"page-header\"\u003e\n\u003cdiv\u003e\n\u003ch3\u003eمناصب وإسهامات أخرى\u0026nbsp;\u003c/h3\u003e\n\u003c/div\u003e\n\u003cdiv class=\"cv-row-l\"\u003e\n\u003ch4\u003eإضافة إلى إمارة منطقة الرياض تولّى الملك سلمان بن عبد العزيز آل سعود خلال مسيرته العديد من المناصب المهمة والمسؤوليات الرفيعة في المملكة العربية السعودية أبرزها:\u003cbr /\u003e\u003cbr /\u003e- رئيس الهيئة العليا لتطوير مدينة الرياض.\u003cbr /\u003e\u003cbr /\u003e- رئيس اللجنة التنفيذية العليا لتطوير الدرعية.\u003cbr /\u003e\u003cbr /\u003e- رئاسة مجلس الأمناء لمكتبة الملك فهد الوطنية.\u003cbr /\u003e\u003cbr /\u003e- رئيس مجلس إدارة دارة الملك عبد العزيز.\u003cbr /\u003e\u003cbr /\u003e- الأمين العام لمؤسسة الملك عبد العزيز الإسلامية.\u003cbr /\u003e\u003cbr /\u003e- الرئيس الفخري لمركز الأمير سلمان الاجتماعي.\u003cbr /\u003e\u003cbr /\u003e- رئيس مجلس إدارة مؤسسة الرياض الخيرية للعلوم، ويتبعها كل من جامعة الأمير سلطان الأهلية وواحة الأمير سلمان للعلوم.\u003cbr /\u003e\u003cbr /\u003e- الرئيس الفخري لمجلس إدارة لجنة أصدقاء المرضى بمنطقة الرياض.\u003cbr /\u003e\u003cbr /\u003e- رئيس مجلس أمناء مؤسسة عبد العزيز بن باز الخيرية.\u003cbr /\u003e\u003cbr /\u003e- الرئيس الفخري لمجلس إدارة مؤسسة عبد العزيز بن باز الخيرية.\u003cbr /\u003e\u003cbr /\u003e- الرئيس الفخري لنادي الفروسية.\u003cbr /\u003e\u003cbr /\u003e- رئيس مجلس إدارة جمعية الأمير سلمان للإسكان الخيري.\u003cbr /\u003e\u003cbr /\u003e- رئيس مجلس إدارة الجمعية الخيرية لرعاية الأيتام بمنطقة الرياض.\u003cbr /\u003e\u003cbr /\u003e\u0026nbsp; \u0026nbsp; \u0026nbsp; \u0026nbsp;ورأس خادم الحرمين الشريفين العديد من الجمعيات والهيئات التي كان لها نشاط خارج المملكة ومنها:\u003cbr /\u003e\u003cbr /\u003e- رئيس لجنة التبرع لمنكوبي السويس عام 1956م.\u003cbr /\u003e\u003cbr /\u003e- رئيس اللجنة الرئيسة لجمع التبرعات للجزائر عام 1956م.\u003cbr /\u003e\u003cbr /\u003e- رئيس اللجنة الشعبية لمساعدة الشعب الفلسطيني.\u003cbr /\u003e\u003cbr /\u003e- رئيس اللجنة الشعبية لإغاثة منكوبي باكستان عام 1973م.\u003cbr /\u003e\u003cbr /\u003e- رئيس اللجنة الشعبية لدعم المجهود الحربي في مصر عام 1973م.\u003cbr /\u003e\u003cbr /\u003e- رئيس اللجنة الشعبية لدعم المجهود الحربي في سوريا عام 1973م.\u003cbr /\u003e\u003cbr /\u003e- رئيس اللجنة الشعبية لمساعدة أسر شهداء الأردن عام 1976م.\u003cbr /\u003e\u003cbr /\u003e- رئيس اللجنة المحلية لإغاثة متضرري السيول في السودان عام 1988م.\u003cbr /\u003e\u003cbr /\u003e- رئيس اللجنة المحلية لتقديم العون والإيواء للمواطنين الكويتيين؛ إثر الغزو العراقي لدولة الكويت عام 1990م.\u003cbr /\u003e\u003cbr /\u003e- رئيس اللجنة المحلية لتلقي التبرعات للمتضررين من الفيضانات في بنجلاديش عام 1991م.\u003cbr /\u003e\u003cbr /\u003e- رئيس الهيئة العليا لجمع التبرعات للبوسنة والهرسك عام 1992م.\u003cbr /\u003e\u003cbr /\u003e- الرئيس الأعلى لمعرض المملكة بين الأمس واليوم، الذي أقيم في عدد من الدول العربية والأوروبية وفي الولايات المتحدة وكندا خلال الفترة 1985م / 1992م.\u003cbr /\u003e\u003cbr /\u003e- رئيس اللجنة العليا لجمع التبرعات لانتفاضة القدس بمنطقة الرياض 2000م / 1421هـ.\u003c/h4\u003e\n\u003cp\u003e\u003cimg class=\"fr-fic fr-dib fr-fir\" style=\"width: 915px;\" src=\"https://clcdn.spa.gov.sa/galupload/otherfiles/2019-03/4c1f5e4f89dc29d6a55dc5ecb65e017aa16989c3.jpg\" /\u003e\u003c/p\u003e\n\u003ch3\u003e\u003cimg class=\"fr-fic fr-dib fr-fir\" style=\"width: 907px;\" src=\"https://clcdn.spa.gov.sa/galupload/otherfiles/2019-03/63dd7d53635867b0015feae232ab8a24420f8742.jpg\" /\u003e\u003c/h3\u003e\n\u003ch3\u003e\u003cimg class=\"fr-fic fr-dib fr-fir\" style=\"width: 906px;\" src=\"https://clcdn.spa.gov.sa/galupload/otherfiles/2019-03/84240a6f4937248a72242fb3ba3cc50e37ae2bb1.jpg\" /\u003e\u003c/h3\u003e\n\u003cp\u003e\u003cimg class=\"fr-fic fr-dib fr-fir\" style=\"width: 905px;\" src=\"https://clcdn.spa.gov.sa/galupload/otherfiles/2019-03/6c23f0127d9320f344786687eb34ac4e7d7cd0a0.jpg\" /\u003e\u003c/p\u003e\n\u003cp\u003e\u003cimg class=\"fr-fic fr-dib fr-fir\" style=\"width: 904px;\" src=\"https://clcdn.spa.gov.sa/galupload/otherfiles/2019-03/2bb8665b516ce1c9e7f9bca01b083beb98da3151.jpg\" /\u003e\u003c/p\u003e\n\u003ch3\u003e\u003cimg class=\"fr-fic fr-dib fr-fir\" style=\"width: 899px;\" src=\"https://clcdn.spa.gov.sa/galupload/otherfiles/2019-03/da04dfe44b8c6ab520534efe6a09f67c32e74192.jpg\" /\u003e\u003c/h3\u003e\n\u003ch3\u003e\u003cimg class=\"fr-fic fr-dib fr-fir\" style=\"width: 906px;\" src=\"https://clcdn.spa.gov.sa/galupload/otherfiles/2019-03/4f5e34125033ed20379c19a1542b2bf2a6690ac1.jpg\" /\u003e\u003c/h3\u003e\n\u003cdiv class=\"page-header\"\u003e\n\u003ch3\u003eالأعمال الخيرية\u0026nbsp;\u003c/h3\u003e\n\u003c/div\u003e\n\u003ch4 class=\"CvImage_spa\"\u003eيُعرف الملك سلمان بأعماله وجهوده الخيرية الواسعة، حيث أسس مركز الملك سلمان للإغاثة والأعمال الإنسانية، ويتولى رئاسة مركز الملك سلمان لأبحاث الإعاقة، والرئاسة الفخرية لجمعية الأمير فهد بن سلمان الخيرية، لرعاية مرضى الفشل الكلوي، والرئاسة الفخرية للمركز السعودي لزراعة الأعضاء، وغيرها العديد من الجهات.\u003cbr /\u003eومنذ عام 1956م، تولّى الملك سلمان رئاسة مجلس إدارة العديد من اللجان الإنسانية والخدماتية التي تولت مسؤوليات أعمال الدعم والإغاثة في العديد من المناطق المنكوبة حول العالم، سواء المناطق المتضررة بالحروب أو بالكوارث الطبيعية.\u003cbr /\u003eوقد نال خادم الحرمين الشريفين عن جهوده الإنسانية هذه العديد من الأوسمة والميداليات من دول عدة.\u003c/h4\u003e\n\u003cdiv class=\"page-header\"\u003e\n\u003ch3\u003eالشهادات الفخرية والأوسمة والجوائز\u003c/h3\u003e\n\u003ch4\u003eالدكتوراه الفخرية من الجامعة الإسلامية في المدينة المنورة.\u003cbr /\u003e\u003cbr /\u003e- الدكتوراه الفخرية في الآداب من جامعة أم القرى في مكة المكرمة.\u003cbr /\u003e\u003cbr /\u003e- الدكتوراه الفخرية في الدراسات التاريخية والحضارية من جامعة الملك سعود بالرياض.\u003cbr /\u003e\u003cbr /\u003e- الدكتوراه الفخرية في مجال تعزيز الوحدة الإسلامية من جامعة الملك عبدالعزيز بجدة.\u003cbr /\u003e\u003cbr /\u003e- الدكتوراه الفخرية في مجال خدمة القرآن الكريم وعلومه من جامعة الإمام محمد بن سعود الإسلامية بالرياض.\u003cbr /\u003e\u003cbr /\u003e- الدكتوراه الفخرية من الجامعة الملّية الإسلامية في دلهي بالهند.\u003cbr /\u003e\u003cbr /\u003e- الدكتوراه الفخرية في الحقوق من جامعة واسيدا اليابانية.\u003cbr /\u003e\u003cbr /\u003e- الدكتوراه الفخرية في العلاقات الدولية من جامعة موسكو.\u003cbr /\u003e\u003cbr /\u003e- الدكتوراه الفخرية من جامعة القاهرة في مصر.\u003cbr /\u003e\u003cbr /\u003e- الدكتوراه الفخرية في العلوم السياسية (خدمة الإسلام والوسطية) من الجامعة الإسلامية بماليزيا.\u003cbr /\u003e\u003cbr /\u003e- الدكتوراه الفخرية في العلوم من جامعة سراييفو البوسنية للعلوم والتقنية عام 2013م.\u003cbr /\u003e\u003cbr /\u003e- الدكتوراه الفخرية في الآداب من جامعة مالايا في ماليزيا.\u003cbr /\u003e\u003cbr /\u003e- الدكتوراه الفخرية من جامعة بكين الصينية.\u003cbr /\u003e\u003cbr /\u003e- زمالة بادن باول الكشفية في السويد.\u003cbr /\u003e\u003cbr /\u003e- قلادة الشريف الحسين بن على وهي أرفع وسام في المملكة الأردنية الهاشمية.\u003cbr /\u003e\u003cbr /\u003e- قلادة مبارك الكبير أرفع وسام في دولة الكويت.\u003cbr /\u003e\u003cbr /\u003e- قلادة النيل وهي أرفع وسام في جمهورية مصر العربية.\u003cbr /\u003e\u003cbr /\u003e- وسام \"كنت\" من أكاديمية برلين - براندنبرغ للعلوم والعلوم الإنسانية.\u003cbr /\u003e\u003cbr /\u003e- وسام بمناسبة مرور ألفي عام على إنشاء مدينة باريس عام 1985م.\u003cbr /\u003e\u003cbr /\u003e- وسام الكفاءة الفكرية المغربي في الدار البيضاء.\u003cbr /\u003e\u003cbr /\u003e- وسام البوسنة والهرسك الذهبي.\u003cbr /\u003e\u003cbr /\u003e- الوسام البوسني للعطاء الإسلامي من الدرجة الأولى.\u003cbr /\u003e\u003cbr /\u003e- وسام نجمة القدس.\u003cbr /\u003e\u003cbr /\u003e- وسام \"سكتونا\" الذي يعد أعلى وسام في جمهورية الفلبين.\u003cbr /\u003e\u003cbr /\u003e- وسام من الجمهورية اليونانية. \u0026nbsp;\u003cbr /\u003e\u003cbr /\u003e- وسام نسر الاستيك من درجة القلادة أرفع وسام في الولايات المتحدة المكسيكية.\u003cbr /\u003e\u003cbr /\u003e- وسام القلادة الكبرى وهو أعلى وسام في دولة فلسطين.\u003cbr /\u003e\u003cbr /\u003e- وسام ياروسلاف الحكيم من الدرجة الأولى وهو وسام الدولة الأعلى في جمهورية أوكرانيا.\u003cbr /\u003e\u003cbr /\u003e- الوسام الأعلى في جمهورية مالي.\u003cbr /\u003e\u003cbr /\u003e- وسام الجمهورية وهو أعلى وسام في تركيا.\u003cbr /\u003e\u003cbr /\u003e- وسام الأسد الوطني، الذي يعد أرفع وسام في جمهورية السنغال.\u003cbr /\u003e\u003cbr /\u003e- وسام الاستحقاق الوطني الذي يعد أعلى وسام في جمهورية النيجر.\u003cbr /\u003e\u003cbr /\u003e- وسام البرلمان العربي من الدرجة الأولى.\u003cbr /\u003e\u003cbr /\u003e- وسام نجمة جيبوتي الكبرى.\u003cbr /\u003e\u003cbr /\u003e- وسام الهلال الأخضر القمري من درجة الهلال الأكبر.\u003cbr /\u003e\u003cbr /\u003e- وسام زايد الذي يعد أعلى وسام في دولة الإمارات العربية المتحدة.\u003cbr /\u003e\u003cbr /\u003e- وسام الدولة الأول \"وسام التاج\" الذي يعد أعلى الأوسمة الماليزية.\u003cbr /\u003e\u003cbr /\u003e- وسام (نجمة الجمهورية الإندونيسية) الذي يعد أعلى أوسمة الجمهورية.\u003cbr /\u003e\u003cbr /\u003e- وسام الأسرة المالكة للعرش من سلطنة بروناي دار السلام.\u003cbr /\u003e\u003cbr /\u003e- وسام الأمير نايف للأمن العربي من الدرجة الممتازة.\u003cbr /\u003e\u003cbr /\u003e- وسام الشرف السيراليوني.\u003cbr /\u003e\u003cbr /\u003e- وشاح الملك عبدالعزيز من الطبقة الأولى .\u003cbr /\u003e\u003cbr /\u003e- درع الأمم المتحدة لتقليل آثار الفقر في العالم .\u003cbr /\u003e\u003cbr /\u003e- جائزة جمعية الأطفال المعوقين بالمملكة للخدمة الإنسانية .\u003cbr /\u003e\u003cbr /\u003e- جائزة البحرين للعمل الإنساني لدول مجلس التعاون الخليجي .\u003cbr /\u003e\u003cbr /\u003e- جائزة الأولمبياد الخاص الدولي لمنطقة الشرق الأوسط وشمال أفريقيا في خدمة المعوقين وتشجيع البحث العلمي في مجال الإعاقة .\u003cbr /\u003e\u003cbr /\u003e- جائزة الشخصية القيادية الفخرية في مجال رعاية الأيتام، خلال حفل التكريم بجائزة السنابل للمسؤولية المجتمعية لمؤسسات رعاية الأيتام بدول الخليج 2017 م .\u003cbr /\u003e\u003cbr /\u003e- جائزة الإنجاز الفريد المتميز الممنوحة له من السلطان أحمد شاه، سلطان ولاية باهانج الماليزية .\u003cbr /\u003e\u003cbr /\u003e- جائزة الملك فيصل لخدمة الإسلام من مؤسسة الملك فيصل الخيرية .\u003c/h4\u003e\n\u003c/div\u003e\n\u003cp\u003e\u0026nbsp;\u003c/p\u003e\n\u003cp\u003e\u003cimg class=\"fr-fic fr-dib fr-fir\" style=\"width: 866px;\" src=\"https://clcdn.spa.gov.sa/galupload/otherfiles/2019-03/a23da8ca5c4d99b61f5dd9871c87ace6b0fc108a.jpg\" /\u003e\u003c/p\u003e\n\u003cp\u003e\u003cimg class=\"fr-fic fr-dib fr-fir\" style=\"width: 865px;\" src=\"https://c rs-yet":"No tenders yet","applicant-name":"Applicant's name","offer-value":"Offer value","r-s":"SR","sponsored_by":"Sponsored by","add_hashtag_to_favorite_modal":"Log in to be able to follow the hashtags","royal_news":"Royal News","visit_images":"Images","visit_news":"News","news_title":"News","editors":"Editors","name":"Name","breaking-news":"Breaking news","ourAccounts":"Accounts","loginBy":"Sign in with","loginByShort":"Sign in with","sections":"Sections","no-categories-yet":"No categories yet","no-tags-yet":"No tags yet","no-hashtags-yet":"No hashtags yet","spaces_error":"The name must be in text","responsive-menu":"Menu","no_data_for":"There is no {{data}}","news_header":"News","voice_reader":"Voice reader","cities":"cities","nearby_news_info":"News is displayed based on your favorite category or favorite tag!","royal_orders":"Royal orders","cabinet_sessions":"Cabinet's Sessions","king_news":"King's news","king_images":"Custodian of the Two Holy Mosques News Media","crown_prince_news":"Crown Prince news","crown_prince_images":"Crown Prince News Media","menu_events":"Events","experimental_mode":"You are currently browsing the trial version","ok":"Ok","view_details":"view details","old_version":"Old version","exact_search":"Exact search"}},"__N_SSP":true,"pageProps":{"newsDetails":{"uuid":"N2238183","newswiz_id":"2238183","published_at":1736160539,"tags":[{"id":2,"name":"Reports and Surveys","is_followed":false,"is_notify":false}],"main_tag":null,"category":{"id":3,"name":"Economic","is_main":1,"is_followed":false,"is_notify":false},"country":null,"city":null,"default_image_url":null,"locale":"en","title":"Al-Jouf International Olive Festival: A Leading Tourism and Economic Driver for the Kingdom","subtitle":null,"content":"Sakaka, January 06, 2025, SPA -- The 18th Al-Jouf International Olive Festival has solidified its position as a key tourism and economic event for both the Kingdom and the Al-Jouf region, attracting significant interest, visitors, tourists, and investment from domestic and international sources. The current festival, held at the Prince Abdullah Cultural Center in Sakaka from January 2 to 12, features local, regional, and international participants, including olive and oil producers, processing industries, companies, and agricultural associations.\n    Al-Jouf is renowned as the Kingdom's \"land of olives,\" home to the world’s largest olive farm --according to the Guinness World Records-- and boasting over 23 million trees. These trees produce 150,000 tons of table olives annually, processed by approximately 30 local presses producing premium olive oil. The region encompasses over 16,000 olive farms and cultivation projects.\n    The festival also supports families working in cottage industry, entrepreneurs, and small businesses by providing dedicated spaces to showcase their products, fostering growth and expanding their reach to consumers and partners.\n    Festival CEO Omar bin Abdulaziz Al-Hamwan noted the festival’s established status as an Al-Jouf icon, embodying its unique position in olive and olive oil production, yielding over 20,000 tons of oil annually—equivalent to 80% of the Kingdom's total production. The festival’s international appeal is evident in the participation of seven countries this year: Spain, Italy, Türkiye, Egypt, Jordan, Syria, and Palestine.\n    This year’s event features 45 farmers and five agricultural companies, alongside Al-Jouf Municipality laboratory, which has conducted over 2,100 tests on samples from participating farmers, analyzing over 40 tons of oil and seven tons of table olives for acidity, rancidity, and metal content. Products meeting these standards receive a certification label, confirming their safety and suitability for display.\n    The festival also showcases Saudi heritage and culture through folk art performances, the Saudi Ardah, traditional fashion and handicrafts such as Sadu weaving, as well as plastic arts, poetry, and cultural evenings.\n    --
