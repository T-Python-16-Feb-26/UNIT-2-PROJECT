<!DOCTYPE html><html lang="en"><head><meta charSet="utf-8"/><title>Al-Jouf International Olive Festival: A Leading Tourism and Economic Driver for the Kingdom</title><meta name="viewport" content="initial-scale=1, width=device-width"/><meta name="msapplication-tooltip" content="SaudiPressAgency, official  news source"/><meta name="application-name" content="SaudiPressAgency"/><meta name="msapplication-starturl" content="https://spa.gov.sa/"/><meta name="title" content="Al-Jouf International Olive Festival: A Leading Tourism and Economic Driver for the Kingdom"/><meta name="description" content="Sakaka, January 06, 2025, SPA -- The 18th Al-Jouf International Olive Festival has solidified its position as a key tourism and economic event for both the Kingdom and the Al-Jouf region, attracting significant interest, visitors, tourists, and investment from domestic and international sources. The current festival, held at the Prince Abdullah Cultural Center in Sakaka from January 2 to 12, features local, regional, and international participants, including olive and oil producers, processing industries, companies, and agricultural associations.
    Al-Jouf is renowned as the Kingdom's &quot;land of olives,&quot; home to the world’s largest olive farm --according to the Guinness World Records-- and boasting over 23 million trees. These trees produce 150,000 tons of table olives annually, processed by approximately 30 local presses producing premium olive oil. The region encompasses over 16,000 olive farms and cultivation projects.
    The festival also supports families working in cottage industry, entrepreneurs, and small businesses by providing dedicated spaces to showcase their products, fostering growth and expanding their reach to consumers and partners.
    Festival CEO Omar bin Abdulaziz Al-Hamwan noted the festival’s established status as an Al-Jouf icon, embodying its unique position in olive and olive oil production, yielding over 20,000 tons of oil annually—equivalent to 80% of the Kingdom's total production. The festival’s international appeal is evident in the participation of seven countries this year: Spain, Italy, Türkiye, Egypt, Jordan, Syria, and Palestine.
    This year’s event features 45 farmers and five agricultural companies, alongside Al-Jouf Municipality laboratory, which has conducted over 2,100 tests on samples from participating farmers, analyzing over 40 tons of oil and seven tons of table olives for acidity, rancidity, and metal content. Products meeting these standards receive a certification label, confirming their safety and suitability for display.
    The festival also showcases Saudi heritage and culture through folk art performances, the Saudi Ardah, traditional fashion and handicrafts such as Sadu weaving, as well as plastic arts, poetry, and cultural evenings.
    -- SPA

من المواد التي يوفرها موقع وكالة الأنباء السعودية باستثناء استخداماتك الشخصية غير التجارية فقط.\u003c/li\u003e\n\u003cli\u003eتلتزم بالقواعد المحددة التي تنطبق على أي ترويج تشارك فيه بأي شكل من خلال موقع وكالة الأنباء السعودية.\u003c/li\u003e\n\u003cli\u003eتلتزم بعدم القيام بأي شيء يكون من شأنه التأثير على تشغيل أو أمن أو كفاءة موقع وكالة الأنباء السعودية أو يتسبب في إزعاج غير منطقي أو إساءة أو تعطيل أي من المستخدمين الآخرين أو العاملين لدينا.\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp\u003e\u003cstrong\u003eالاستخدام الغير المشروع \u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003eيقر الزائر / مستخدم التطبيقات بعدم استخدام الموقع أو التطبيقات بالطرق التالية سواء قام\u0026nbsp; بها الزائر / المستخدم شخصيا أو من خلال طرف ثالث.\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003eاستخدام عملية آلية لمعالجة، مراقبة، نسخ، استخراج أي صفحات موجودة على موقع وكالة الأنباء السعودية ، أو أي معلومات، أو محتوى أو بيانات يحتويها أو يتم الوصول إليها عن طريق موقع وكالة الأنباء السعودية ، دون الحصول على الموافقة الخطية المسبقة من قبلنا.\u003c/li\u003e\n\u003cli\u003eاستخدام عملية آلية لتجميع أو دمج المعلومات، أو المحتوى أو البيانات التي يحتويها أو يمكن الوصول إليها عن طريق موقع وكالة الأنباء السعودية أو المواد أو البيانات التي يتم الوصول إليها عن طريق الموقع / التطبيقات والتي يكون مصدرها طرف ثالث.\u003c/li\u003e\n\u003cli\u003eاستخدام أي عملية آلية للتدخل في أو محاولة التدخل في طريقة العمل السليمة لموقع وكالة الأنباء السعودية.\u003c/li\u003e\n\u003cli\u003eالقيام بأي فعل يكون من شأنه فرض حمل كبير بموقع وكالة الأنباء السعودية.\u003c/li\u003e\n\u003cli\u003eتطبيق هندسة عكسية، أو جمع عكسي، أو تفكيك، أو أي عمل آخر من يكون شأنه اكتشاف رمز مصدري أو البنية التحتية والعمليات المتعلقة بموقع وكالة الأنباء السعودية .\u003c/li\u003e\n\u003cli\u003eنشر موقع بتصميم مطابق أو مشابهد جدا للإيحاء بأنه موقع وكالة الأنباء السعودية.\u003c/li\u003e\n\u003cli\u003eتغيير، تعديل، أو محاولة التغيير أو الإيهام بالتعديل و التغيير لأي جزء من الموقع / التطبيقات.\u003c/li\u003e\n\u003cli\u003eإقامة عرض عام، لأي جزء من محتوى موقع وكالة الأنباء السعودية دون الموافقة الخطية المسبقة من قبلنا.\u003c/li\u003e\n\u003cli\u003eاستخدام الموقع على نحو يخالف أي قوانين مرعية ومطبقة أو حقوق أو إستحقاقات قانونية لأي طرف آخر.\u003c/li\u003e\n\u003cli\u003eاستخدام الموقع على نحو يؤدي أو من المحتمل أن يؤدي إلى تخريبه.\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp\u003e\u0026nbsp;\u003c/p\u003e\n\u003cp\u003eالإستخدامات الغير مشروعة المذكورة أعلاه تضع الطرف / الأطراف التي لا تلتزم بها تحت طائلة القانون.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eسياسة تقديم المحتوي للموقع \u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003eبتقديمك أي محتوى لموقع وكالة الأنباء السعودية فإنك تمنحنا ترخيصا غير حصريا، ومجانيا، ودائما، وقابلا للتحويل، وعالميا، غير قابلا للنقض، وقابل للترخيص الفرعي من أجل\u003c/p\u003e\n\u003cp\u003e\u0026nbsp;(أ) استخدامه، وإعادة إنتاجه، وتعديله، وتحريره، وتكييفه، وترجمته، وتوزيعه، ونشره، ونسخه، وبثه وتوصيله بأي شكل من الأشكال، وفي أعمال مقتبسة منه لعرضه أو أدائه أمام جمهور في أي مكان في العالم ومن خلال أي وسيلة إعلامية، معروفة الآن أو يتم ابتداعها مستقبلا .\u003c/p\u003e\n\u003cp\u003e(ب) استخدام الاسم الذي قمت بتقديمه بالترابط مع المحتوى كما تمنحنا رخصة للملاحقة القانونية لأي شخص حقيقي أو اعتباري يخالف حقوقك أو حقوقنا في هذا المحتوى، وأنت تقر وتوافق على أن جميع المحتوى المقدم لموقع وكالة الأنباء السعودية من قِبلك هو غير سري وغير مملوك، كما تقر كافة الأشياء وتنفيذ جميع الوثائق المطلوبة لتمكيننا والسماح لنا بالاستفادة المطلقة من الحقوق الممنوحة لنا حسب متطلبات هذه الشروط والأحكام.\u003c/p\u003e\n\u003cp\u003e(ج) نحن غير ملزمون، ولا يلزمنا أي بند من بنود هذه الشروط والأحكام بأي شكل من الأشكال، باستخدام أي محتوى، إلى جانب ذلك، فإننا وفي حال استخدام المحتوى غير مطالبون بأداء أي التزامات مالية تجاهك نتيجة هذا الاستخدام.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e\u0026nbsp;\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e\u0026nbsp;لا نسمح بتقديم المحتوى التالي\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003eمحتوى يشكل، أو يشجع، أو يقدم تعليمات لمخالفة جرمية، أو خرق حقوق أي طرف كان، أو يتسبب بأي شكل من الأشكال في مسؤولية قانونية أو يخرق أي من القوانين المحلية أو الوطنية أو الدولية، بما في ذلك\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003eمحتوى يتسبب في إزعاج أو مضايقة الآخرين أو يحض على ذلك.\u003c/li\u003e\n\u003cli\u003eمحتوى غير قانوني، أو يتضمن تشهير، أو ذم، أو مسيء لأي مجموعة دينية أو أخلاقية، أو محتوى فاضح، أو إباحي، أو فاحش، أو بذيء، أو فيه إيحاءات، أو مضايقات، أو تهديدات، أو خرق لحقوق الخصوصية والنشر، أو عنيف، أو مثير للحساسيات، أو احتيالي أو غير مقبول بأي شكل من الأشكال.\u003c/li\u003e\n\u003cli\u003eمحتوى لا تمتلكه أنت شخصيا دون إذن صريح من مالك ذلك المحتوى.\u003c/li\u003e\n\u003cli\u003eمحتوى قد يتسبب في خرق أي براءة اختراع، أو علامة تجارية، أو سر تجاري، أو حقوق التأليف والنشر، أو غيرها من الحقوق الفكرية أو الملكية لأي طرف.\u003c/li\u003e\n\u003cli\u003eمحتوى ينتحل شخصية أي شخص حقيقي أو اعتباري أو يتسبب بأي شكل من الأشكال في ادعاء كاذب بتبعية لذلك الشخص الحقيقي أو الاعتباري، بما في ذلك نحن.\u003c/li\u003e\n\u003cli\u003eمواد ترويجية غير مرغوبة، أو حملات سياسية، أو الإعلانات، أو المسابقات، أو السحوبات، أو تقديم عروض\u003c/li\u003e\n\u003cli\u003eمعلومات خاصة بطرف ثالث، وعلى سبيل المثال لا الحصر، اسم العائلة، وعنوان، وأرقام هواتف، وعناوين بريد إلكتروني، وأرقام بطاقات ائتمان ، .....\u003c/li\u003e\n\u003cli\u003eفيروسات، أو بيانات مخربة، أو ملفات أخرى تتسبب في أضرار، أو أعطال أو تخريب.\u003c/li\u003e\n\u003cli\u003eمحتوى غير مرتبط بموضوع المنطقة (المناطق) التفاعلية والتي يتم نشر المحتوى فيها.\u003c/li\u003e\n\u003c/ol\u003e","terms_en":"\u003cp\u003e\u003cstrong\u003eLegal use \u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003eThe visitor/app user acknowledges that his/her use of SPA's website or affiliated applications will be as stipulated in the following conditions:\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003eObligation not to copy, download, reproduce, repost, frame, broadcast, or in any way send any of the materials provided by the SPA website except for your personal and non-commercial uses only.\u003c/li\u003e\n\u003cli\u003eAbidin approval.\u003c/li\u003e\n\u003cli\u003eUsing the website in violation of any applicable laws or legal rights or entitlements of any other party.\u003c/li\u003e\n\u003cli\u003eUsing the website in a manner that leads or might lead to damage it.\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp\u003e\u0026nbsp;\u003c/p\u003e\n\u003cp\u003eThe aforementioned illegal uses place the party/parties that fail to commit to them under legal liability.\u003c/p\u003e\n\u003cp\u003e\u0026nbsp;\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003ePolicy for Providing Content to the Website\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003eBy submitting any content to the SPA website, you grant us a non-exclusive, free, permanent, transferable, universal, irrevocable and sub-licensable to:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eUse, reproduce, modify, edit, adapt, translate, distribute, publish, copy, transmit and communicate the content in any way, and use quotes from it for presentation or performance before an audience anywhere in the world and through any media, whether it is already established or to be established in the future.\u003c/li\u003e\n\u003cli\u003eUse the name you provide in conjunction with the content and give us a license to prosecute any real or legal person who infringes your or our rights to this content, and you acknowledge and agree that all the content provided to the SPA website by you is unclassified and un-owned, in addition to approving all things and executing all the documents required to enable and allow us to take full advantage of the rights granted to us in accordance with the requirements of these terms and conditions.\u003c/li\u003e\n\u003cli\u003eWe are not bound, nor are we bound by any of these terms and conditions in any way, to use any content. Besides, if we use the content, we are not required to perform any financial obligations to you as a result of such use.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u0026nbsp;\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eWe do not allow the following content to be provided:\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003eContent that constitutes, encourages or provides instructions for a criminal offence, infringes the rights of any party or in any way causes legal liability or breaches any domestic, national or international law, including:\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003eContent that causes or incites inconvenience or harassment to others.\u003c/li\u003e\n\u003cli\u003eAny content that is illegal, or contains defamation, slander or offense to any religious or moral group, or can be scandalous, pornographic, obscene, insulting, or with implications, harassment, threats, or breach of privacy and publishing rights, violent, sensitive, fraudulent or unacceptable in any way.\u003c/li\u003e\n\u003cli\u003eContent that you personally do not possess without the explicit permission of the owner of that content.\u003c/li\u003e\n\u003cli\u003eContent that may cause a breach of any patent, trademark, trade secret, copyright, or other intellectual or property rights of any party.\u003c/li\u003e\n\u003cli\u003eContent that impersonates any real or legal person or in any way causes a false allegation by subordination to that real or legal person, including us.\u003c/li\u003e\n\u003cli\u003eUnsolicited promotional materials, political campaigns, advertisements, competitions, draws or offers.\u003c/li\u003e\n\u003cli\u003eThird-party information, including family name, address, telephone numbers, email addresses, and credit card numbers to name a few.\u003c/li\u003e\n\u003cli\u003eViruses, disruptive data, or other files causing damage, malfunction or vandalism.\u003c/li\u003e\n\u003cli\u003eContent not related to the interactive area/areas in which the content is posted.\u003c/li\u003e\n\u003c/ol\u003e","privacy_ar":"\u003ch2\u003eالخصوصية وحماية البيانات\u003c/h2\u003e\n\u003ch3\u003eتدرك وكالة الأنباء السعودية أهمية خصوصيتك وبياناتك الشخصية؛ لذلك، نلتزم بالحفاظ على جميع المعلومات والبيانات الهامة لجميع المستخدمين آمنة ومأمونة وسرية. \u003cbr /\u003e\u003cbr /\u003eتخضع سياسة الخصوصية وإجراءات البوابة الإلكترونية \"وكالة الأنباء السعودية\" \u003ca href=\"https://laws.boe.gov.sa/boelaws/laws/lawdetails/b7cfae89-828e-4994-b167-adaa00e37188/1\"\u003eلقانون حماية البيانات الشخصية\u003c/a\u003e\u0026nbsp;(المرسوم الملكي رقم. (م/19) بتاريخ 1443/2/9ه)، المبادئ الرئيسية لحماية المعلومات الشخصية والمبادئ الرئيسية والقواعد العامة لتبادل البيانات الصادرة عن ا\u003ca href=\"https://sdaia.gov.sa/\"\u003eلهيئة السعودية للبيانات والذكاء الاصطناعي\u003c/a\u003e\u0026nbsp;و\u003ca href=\"https://sdaia.gov.sa/ndmo/\"\u003eمكتب إدارة البيانات الوطنية\u003c/a\u003e. \u003cbr /\u003e\u003cbr /\u003eيضع قانون حماية البيانات الشخصية ولائحته التنفيذية الأساس القانوني لحماية حقوقك فيما يتعلق بمعالجة البيانات الشخصية من قبل جميع الكيانات في المملكة، وكذلك جميع الكيانات خارج المملكة التي تعالج البيانات الشخصية المتعلقة بالأفراد المقيمين في المملكة باستخدام أي وسيلة، بما في ذلك معالجة البيانات الشخصية عبر الإنترنت. \u003cbr /\u003e\u003cbr /\u003eتشمل المبادئ الأساسية لسياسة حماية البيانات الخاصة بنا ما يلي:\u003c/h3\u003e\n\u003ch3\u003e\u0026bull; مساءلة رئيس الكيان (أو من ينوب عنه) عن سياسات وإجراءات الخصوصية الخاصة بمسؤول الخصوصية.\u003cbr /\u003e\u0026bull; الشفافية من خلال إشعار الخصوصية الذي يشير إلى الأغراض التي يتم من أجلها جمع البيانات الشخصية.\u003cbr /\u003e\u0026bull; الاختيار والموافقة التي تم الحصول عليها من خلال الموافقة الضمنية أو الصريحة فيما يتعلق بجمع البيانات الشخصية واستخدامها والإفصاح عنها قبل جمعها.\u003cbr /\u003e\u0026bull; قصر جمع البيانات على الحد الأدنى من البيانات التي تمكن من تحقيق الأغراض.\u003cbr /\u003e\u0026bull; الاستخدام والاحتفاظ والتدمير بشكل صارم للغرض المقصود، والاحتفاظ به طالما كان ذلك ضروريا لتحقيق الأغراض المقصودة أو كما هو مطلوب بموجب القوانين واللوائح وتدميره بأمان، ومنع التسرب، أو الفقدان، أو السرقة، أو سوء الاستخدام، أو الوصول غير المصرح به.\u003cbr /\u003e\u0026bull; الوصول إلى البيانات التي يمكن لأي موضوع بيانات من خلالها مراجعة بياناته الشخصية وتحديثها وتصحيحها.\u003cbr /\u003e\u0026bull; قيود الإفصاح عن البيانات المعتمدة من قبل موضوع البيانات تقيد الأطراف الأخرى بالأغراض المنصوص عليها في إشعار الخصوصية.\u003cbr /\u003e\u0026bull; أمن البيانات من خلال حماية البيانات الشخصية من التسرب، أو التلف، أو الفقدان، أو السرقة، أو سوء الاستخدام، أو التعديل، أو الوصول غير المصرح به؛ وفقا للضوابط الصادرة عن الهيئة الوطنية للأمن السيبراني والسلطات الأخرى ذات الصلة.\u003cbr /\u003e\u0026bull; جودة البيانات بعد التحقق من دقتها واكتمالها.\u003cbr /\u003e\u0026bull; مراقبة سياسات وإجراءات خصوصية البيانات والامتثال لها، وأي استفسارات وشكاوى ونزاعات متعلقة بالخصوصية.\u003c/h3\u003e\n\u003ch3\u003eتغطي المعايير الوطنية لإدارة البيانات وحماية البيانات الشخصية 15 مجالا لإدارة البيانات وحماية البيانات الشخصية. تنطبق المعايير على جميع البيانات الحكومية بغض النظر عن الشكل أو النوع، بما في ذلك السجلات الورقية أو رسائل البريد الإلكتروني أو البيانات المخزنة في شكل إلكتروني، أو التسجيلات الصوتية، أو مقاطع الفيديو، أو الخرائط، أو الصور، أو البرامج النصية، أو المستندات المكتوبة بخط اليد أو البيانات المسجلة الأخرى.\u003c/h3\u003e\n\u003ch3\u003eلا يخل تطبيق أحكام قانون حماية البيانات الشخصية ولائحته التنفيذية باختصاصات ومهام الهيئة الوطنية للأمن السيبراني كسلطة أمنية مختصة بالأمن السيبراني وشؤونه في المملكة العربية السعودية.\u003c/h3\u003e\n\u003ch2\u003eاتفاقية الخصوصية وحماية البيانات\u003c/h2\u003e\n\u003ch3\u003eبصفتك مستخدما للبوابة الإلكترونية وتطبيقها، فإنك تقبل سياسات ولوائح الخصوصية وحماية البيانات في المملكة العربية السعودية؛ التي تتحكم في البوابة وتطبيقها. تصبح هذه الاتفاقية سارية المفعول فور استخدام البوابة أو الوصول إليها لأول مرة.\u003c/h3\u003e\n\u003ch3\u003eإذا كنت لا توافق على هذه السياسة، يجب عليك عدم استخدام أي من خدمات البوابة الإلكترونية \u0026nbsp;\"وكالة الأنباء السعودية\".\u003c/h3\u003e\n\u003cp\u003e\u0026nbsp;\u003c/p\u003e\n\u003ch2\u003eجمع بيانات المستخدمين\u003c/h2\u003e\n\u003ch3\u003eيرتبط الغرض من جمع البيانات الشخصية ارتباطا مباشرا بأغراض البوابة الإلكترونية ولا يتعارض مع أي حكم محدد. تكون طرق ووسائل جمع المعلومات الشخصية مناسبة لظروف المالك، ومباشرة وواضحة وآمنة، وخالية من الخداع أو المعلومات المضللة أو الابتزاز. إذا اتضح أن البيانات الشخصية التي تم جمعها لم تعد ضرورية لتحقيق الغرض من جمعها، فستتوقف البوابة الإلكترونية \"وكالة الأنباء السعودية\"\u0026nbsp;عن الاحتفاظ بها وتدمير البيانات التي تم جمعها سابقا على الفور.\u003c/h3\u003e\n\u003ch3\u003eستضمن البوابة الإلكترونية \"وكالة الأنباء السعودية\"\u0026nbsp;استيفاء المعايير التالية قبل جمع بياناتك الشخصية:\u003c/h3\u003e\n\u003col\u003e\n\u003cli\u003eمبرر جمع بياناتك الشخصية.\u003c/li\u003e\n\u003cli\u003eالغرض من جمع بياناتك الشخصية، سواء كانت كلها أو جزء منها، إلزامي أو اختياري، مع مزيد من المعلومات حول معالجة البيانات التي لا تتعارض مع الغرض من جمعها أو التي ينص عليها القانون بطريقة أخرى.\u003c/li\u003e\n\u003cli\u003eالهوية والعنوان المرجعي لجامع البيانات الشخصية عند الاقتضاء، ما لم يكن ذلك لأغراض أمنية.\u003c/li\u003e\n\u003cli\u003eالكيان أو الكيانات التي سيتم الكشف عن البيانات الشخصية إليها ووصفها وما إذا كان سيتم نقل البيانات الشخصية أو الكشف عنها أو معالجتها خارج المملكة.\u003c/li\u003e\n\u003cli\u003eالآثار والمخاطر المحتملة لعدم الامتثال لإجراء جمع البيانات الشخصية.\u003c/li\u003e\n\u003cli\u003eحقوق الخصوصية وحماية البيانات الخاصة بك كما هو منصوص عليه في القانون.\u003c/li\u003e\n\u003cli\u003eالعناصر الأخرى التي تحددها اللوائح اعتمادا على طبيعة النشاط الذي يمارسه هذا الكيان.\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp\u003e\u0026nbsp;\u003c/p\u003e\n\u003ch3\u003eفي حالة جمع البيانات الشخصية من غير المالكين، سيتم استيفاء الشروط التالية:\u003c/h3\u003e\n\u003col\u003e\n\u003cli\u003eإذا وافق مالك البيانات الشخصية على القيام بذلك، بموجب أحكام القانون.\u003c/li\u003e\n\u003cli\u003eإذا كانت البيانات الشخصية متاحة للجمهور أو تم جمعها من مصدر متاح للجمهور.\u003c/li\u003e\n\u003cli\u003eإذا كانت الجهة كيانا عاما، ولم يكن جمع البيانات الشخصية مملوكا أو معالجا بشكل مباشر لغرض آخر غير الغرض الذي تم جمعها من أجله، فهذا مطلوب لأغراض أمنية أو لتنفيذ نظام آخر أو لتلبية المتطلبات القضائية وفقا للأحكام المحددة في اللوائح.\u003c/li\u003e\n\u003cli\u003eإذا كان الامتثال لهذا الحظر قد يضر بمالك البيانات الشخصية أو يؤثر على مصالحه الحيوية، من خلال الأحكام المحددة في اللوائح.\u003c/li\u003e\n\u003cli\u003eإذا كان جمع البيانات الشخصية أو معالجتها ضروريا لحماية صحة، أو السلامة العامة، أو حياة أو صحة فرد معين أو أفراد معينين.\u003c/li\u003e\n\u003cli\u003eإذا لم يتم تسجيل البيانات الشخصية أو تخزينها بتنسيق يجعل من الممكن تحديد هوية مالكها وتحديد هويته بشكل مباشر أو غير مباشر.\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp\u003e\u0026nbsp;\u003c/p\u003e\n\u003ch2\u003eما هي البيانات التي نجمعها؟\u003c/h2\u003e\n\u003ch3\u003eعندما تزور البوابة الإلكترونية \u0026nbsp;\"وكالة الأنباء السعودية\"، تقوم خوادمنا تلقائيا بجمع عنوان IP الخاص بك وجمع معلومات حول متصفح المستخدم ومحرك البحث والموقع الجغرافي وتاريخ ووقت عنوان URL.\u003c/h3\u003e\n\u003ch3\u003eستحدد البيانات الشخصية، أيا كان مصدرها أو شكلها، هوية الفرد صراحة أو تجعل من الممكن التعرف عليه بشكل مباشر أو غير مباشر، وتشمل الاسم ورقم التعريف الشخصي والعناوين وأرقام الاتصال وأرقام التراخيص والسجلات والممتلكات الشخصية والحساب المصرفي وأرقام بطاقات الائتمان والصور الثابتة أو المتحركة للفرد وغيرها من البيانات ذات الطبيعة الشخصية.\u003c/h3\u003e\n\u003ch3\u003eويشمل أي عملية تتم على البيانات الشخصية بأي وسيلة، سواء كانت يدوية أو آلية، بما في ذلك الجمع والتسجيل والحفظ والفهرسة والترتيب والتنسيق والتخزين والتعديل والتحديث والتكامل والاسترجاع والاستخدام والإفصاح والنقل والنشر ومشاركة البيانات أو الربط البيني، والحظر، والمسح الضوئي، والتدمير.\u003c/h3\u003e\n\u003ch3\u003eملفات تعريف الارتباط هي ملفات محفوظة على هاتفك أو جهازك اللوحي أو جهاز الحاسوب الخاص بك عند زيارة البوابة الإلكترونية \"وكالة الأنباء السعودية\".\u003c/h3\u003e\n\u003cp\u003e\u0026nbsp;\u003c/p\u003e\n\u003ch2\u003eلماذا نحتاج إلى بياناتك؟\u003c/h2\u003e\n\u003ch3\u003eيساعدنا استخدام عنوان IP في حل أي مشاكل فنية تنشأ على سيرفراتنا، بما في ذلك الإحصاءات حول استخدام البوابة (مثل عدد الزوار ولغة الحاسوب المستخدم وما إلى ذلك). سيستفيد تحديد الموقع الجغرافي للمستخدمين من توافر خدمات محددة على المنصة وتطبيقه.\u003c/h3\u003e\n\u003ch3\u003eتعزز ملفات تعريف الارتباط استخدامك للبوابة وتفهم حاجتك بشكل أفضل لذا نحن نستخدم ملفات تعريف الارتباط لجمع وتخزين المعلومات حول كيفية استخدامك للبوابة الإلكترونية \"وكالة الأنباء السعودية\" والخدمات الرقمية الحكومية.\u003c/h3\u003e\n\u003cp\u003e\u003cstrong\u003e\u0026nbsp;\u003c/strong\u003e\u003c/p\u003e\n\u003ch2\u003eكيف نقوم بمعالجة البيانات الشخصية وتخزينها؟\u003c/h2\u003e\n\u003ch3\u003eلن تتم معالجة بياناتك الشخصية دون اتخاذ خطوات كافية للتحقق من دقتها واكتمالها وحداثتها وأهميتها للغرض الذي جمعتها من أجله أحكام اللوائح.\u003c/h3\u003e\n\u003ch3\u003eتطبق\u0026nbsp;البوابة الإلكترونية \"وكالة الأنباء السعودية\" أعلى معايير الأمان لحماية البيانات والمعلومات. يتم تشفير البيانات الحساسة وأي بيانات يجب الحفاظ على سريتها بموجب المتطلبات القانونية وتخضع لضوابط وإجراءات إضافية. تشمل البيانات الحساسة الأصل العرقي، أو القبلي للفرد، أو المعتقد الديني، أو الفكري، أو السياسي، أو تشير إلى العضوية في الجمعيات أو المؤسسات المدنية، بالإضافة إلى البيانات الجنائية والأمنية والبيانات البيو مترية التي تحدد البيانات الوراثية وبيانات التأمين والبيانات الصحية وبيانات الموقع والبيانات الائتمانية والبيانات التي تشير إلى أن والدي الفرد مجهولان أو أحدهما.\u003c/h3\u003e\n\u003ch3\u003eيسمح لموظفينا الفنيين بالتعامل مع معلومات محددة\u0026nbsp;لتقديم خدمات البوابة الإلكترونية \"وكالة الأنباء السعودية\" التي تتفق مع احتياجاتك. لا نسمح أبدا لأي طرف آخر بمعرفة عنوان IP الخاص بك غير الفريق الفني للبوابة الإلكترونية \"وكالة الأنباء السعودية\".\u003c/h3\u003e\n\u003ch3\u003eفي الظروف الاستثنائية قد تتاح معلوماتك للمسؤولين الحكوميين؛ ومع ذلك، لن تتاح للجمهور أبدا دون موافقتك المسبقة. علاوة على ذلك، لن يتم تعميم هذه المعلومات أو تبادلها أو بيعها إلى أي طرف ثالث دون موافقتك المسبقة.\u003c/h3\u003e\n\u003ch3\u003eلن يتم الكشف عن بياناتك الشخصية إلا في الحالات التالية:\u003c/h3\u003e\n\u003col\u003e\n\u003cli\u003eإذا وافقت على الكشف عنها وفقا لأحكام القانون.\u003c/li\u003e\n\u003cli\u003eإذا تم جمع بياناتك الشخصية من مصدر متاح للجمهور.\u003c/li\u003e\n\u003cli\u003eإذا كانت الجهة التي تطلب الإفصاح كيانا عاما، لأغراض أمنية، لتنفيذ نظام آخر، أو لتلبية المتطلبات القضائية وفقا للأحكام المحددة في اللوائح.\u003c/li\u003e\n\u003cli\u003eإذا كان الكشف ضروريا لحماية الصحة العامة، أو السلامة العامة، أو حياة فرد، أو أفراد معينين، أو صحتهم.\u003c/li\u003e\n\u003cli\u003eإذا اقتصر الإفصاح على معالجته اللاحقة بطريقة لا تؤدي إلى تحديد هوية مالك البيانات الشخصية أو أي فرد آخر على وجه التحديد.\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp\u003e\u0026nbsp;\u003c/p\u003e\n\u003ch3\u003eلا يجوز لوكالة الأنباء السعودية\u0026nbsp;الكشف عن بياناتك الشخصية في حال الكشف يؤدي إلى أي مما يلي:\u003c/h3\u003e\n\u003col\u003e\n\u003cli\u003eإنه يمثل تهديدا للأمن أو يضر بسمعة المملكة أو يتعارض مع مصالحها.\u003c/li\u003e\n\u003cli\u003eإنه يؤثر على علاقات المملكة مع الدول الأخرى.\u003c/li\u003e\n\u003cli\u003eإنه يمنع الكشف عن جريمة أو ينتهك حقوق المتهم في محاكمة عادلة، أو يؤثر على نزاهة الإجراءات الجنائية القائمة.\u003c/li\u003e\n\u003cli\u003eإنه يعرض سلامة الفرد أو الأفراد للخطر.\u003c/li\u003e\n\u003cli\u003eإنه ينطوي على انتهاك لخصوصية فرد آخر غير مالك البيانات الشخصية على النحو الذي تحدده اللوائح.\u003c/li\u003e\n\u003cli\u003eإنه يتعارض مع مصلحة غير مكتملة أو غير قادرة.\u003c/li\u003e\n\u003cli\u003eإنه ينتهك الالتزامات المهنية الثابتة.\u003c/li\u003e\n\u003cli\u003eإنه ينطوي على خرق لالتزام أو إجراء أو حكم قضائي.\u003c/li\u003e\n\u003cli\u003eإنه يكشف عن مصدر سري للمعلومات لا ينبغي للمصلحة العامة الكشف عنه.\u003c/li\u003e\n\u003c/ol\u003e\n\u003ch3\u003eسوف تقوم وكالة الأنباء السعودية\u0026nbsp;بالتخلص من بياناتك الشخصية بمجرد انتهاء الغرض من جمعها. ومع ذلك، يجوز لها\u0026nbsp;الاحتفاظ بهذه البيانات بعد انتهاء الغرض من جمعها إذا تمت إزالة كل ما يؤدي إلى معرفة محددة بالمالك وفقا للضوابط المحددة في اللوائح.\u003c/h3\u003e\n\u003ch3\u003eتحتفظ وكالة الأنباء السعودية بالبيانات الشخصية حتى بعد انتهاء الغرض من جمعها في الحالات التالية فقط:\u003c/h3\u003e\n\u003cul\u003e\n\u003cli\u003eإذا كان هناك مبرر منهجي يجب الاحتفاظ به لفترة محددة، وفي هذه الحالة يجب إتلافه بعد نهاية هذه الفترة أو انتهاء الغرض من جمعه، أيهما أطول.\u003c/li\u003e\n\u003cli\u003eإذا كانت البيانات الشخصية مرتبطة ارتباطا وثيقا بقضية معروضة على هيئة قضائية وكان الاحتفاظ بها مطلوبا لهذا الغرض، وفي هذه الحالة يتم إتلافها بعد الانتهاء من الإجراءات القضائية للقضية.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u0026nbsp;\u003c/p\u003e\n\u003ch2\u003eشروط الاستخدام\u003c/h2\u003e\n\u003ch3\u003e\u0026nbsp;البوابة الإلكترونية \"وكالة الأنباء السعودية\" متاحة لجميع المستخدمين. من خلال الوصول إلى هذه البوابة، تعتبر أنت ومستخدمي الموقع موافق وتتفق على جميع شروط الاستخدام، بما في ذلك جميع القوانين واللوائح المعمول بها في المملكة العربية السعودية.\u003c/h3\u003e\n\u003ch3\u003eكمستخدم مسجل، لديك الحق الكامل في:\u003c/h3\u003e\n\u003cul\u003e\n\u003cli\u003eالوصول إلى المعلومات.\u003c/li\u003e\n\u003cli\u003eالحصول على المعلومات.\u003c/li\u003e\n\u003cli\u003eتصحيح المعلومات أو تعديلها.\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003eسحب الاتفاقية وحذف المعلومات عن طريق التواصل معنا من خلال صفحة تواصل معنا. يحق لك، بصفتك مستخدما مالكا للبيانات الشخصية، أن تعرف (بما في ذلك الإبلاغ) عن المبرر الرسمي أو العملي الذي تم النظر فيه لجمع بياناتك الشخصية، وعدم معالجة بياناتك لاحقا بطريقة تتعارض مع الغرض من جمعها أو غير ذلك. لديك الحق في طلب اتلاف بياناتك الشخصية المتاحة لدينا دون الإخلال بأحكام القانون.\u003c/h3\u003e\n\u003cp\u003e\u0026nbsp;\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e\u0026nbsp;\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e\u0026nbsp;\u003c/strong\u003e\u003c/p\u003e\n\u003ch2\u003eقيود المستخدم: من خلال الوصول إلى هذه البوابة، فإنك توافق على تجنب:\u003c/h2\u003e\n\u003ch3\u003eتوفير أو تحميل الملفات التي تحتوي على برامج، أو مواد، أو بيانات غير مرخصة، أو أي معلومات، أو ملفات أخرى قد تحتوي على فيروسات.\u003c/h3\u003e\n\u003ch3\u003eاستخدام هذه البوابة لإرسال أي بريد إلكتروني تجاري أو غير مرغوب فيه أو إساءة استخدام البوابة بأي طريقة أخرى نشر، أو الإعلان، أو توزيع، أو تعميم المواد والمعلومات التشهيرية أو التي تنتهك قواعد المملكة، وأي مواد أخرى غير مقبولة أو معلومات قابلة للتنفيذ.\u003c/h3\u003e\n\u003ch3\u003eاستخدام هذه البوابة للمشاركة في أي أنشطة غير قانونية أو غير مشروعة في المملكة العربية السعودية.\u003c/h3\u003e\n\u003ch3\u003eاستخدام البوابة للإعلان عن أي منتج أو خدمة قد تؤدي إلى انتهاك القوانين أو القواعد في المملكة باستخدام أي أداة أو برنامج أو إجراء يقطع أو قد يقطع تشغيل البوابة.\u003c/h3\u003e\n\u003ch3\u003eالقيام بأي إجراء يضع حمولة غير معقولة أو يتطلب تخزينا ضخما على البنية التحتية للبوابة.\u003c/h3\u003e\n\u003cp\u003e\u0026nbsp;\u003c/p\u003e\n\u003ch3\u003e\u003cstrong\u003eإنهاء الاستخدام:\u003c/strong\u003e لدينا السلطة وفقا لتقييمنا المطلق للحد من حق المستخدم في تسجيل الدخول أو تعليق أو إنهاء استخدامه دون إشعار مسبق ولأي سبب من الأسباب، بما في ذلك انتهاك شروط الاستخدام أو أي إجراء قد نعتبره غير قانوني أو يسبب ضررا للآخرين. لن يسمح لك بتسجيل الدخول إلى البوابة أثناء هذا الإنهاء.\u003c/h3\u003e\n\u003ch3\u003eباستثناء الظروف المنصوص عليها في القانون، لا يجوز معالجة البيانات الشخصية، أو تغيير الغرض من معالجتها فقط بموافقة المالك. تحدد اللوائح شروط الموافقة، والظروف التي يجب أن تكون فيها الموافقة مكتوبة، والشروط والأحكام المتعلقة بالحصول على موافقة الوصي الشرعي إذا كان مالك البيانات الشخصية غير مكتمل أو عاجز. ومع ذلك، قد لا تكون الموافقة شرطا لتقديم خدمة أو منفعة ما لم تكن الخدمة أو المنفعة مرتبطة بمعالجة البيانات الشخصية المعتمدة.\u003c/h3\u003e\n\u003ch3\u003eمعايير التعليقات والمشاركة الإلكترونية: تتم مراجعة جميع التعليقات في قنوات المشاركة الإلكترونية أو على الشبكات الاجتماعية بدقة للتأكد من مراعاة المستخدمين للمعايير واللوائح المتعلقة بالإدلاء بالتعليقات. تتمتع إدارة النظام الأساسي هذه بسلطة استبعاد أي تعليقات تعتبر غير لائقة، ويلزم المستخدمون بما يلي:\u003c/h3\u003e\n\u003cul\u003e\n\u003cli\u003eمراعاة الأخلاقيات العامة وتجنب أي عبارات غير لائقة أو استخدام كلمات غير مهذبة.\u003c/li\u003e\n\u003cli\u003eإبقاء التعليقات ذات الصلة والتركيز على القضية قيد المناقشة.\u003c/li\u003e\n\u003cli\u003eتجنب التعصب والنقد الشخصي الذي لا يثري النقاش.\u003c/li\u003e\n\u003cli\u003eالتأكد تماما من دقتها عند الإشارة إلى النصوص القرآنية أو الآراء الدينية والسماح للمتخصصين فقط بمناقشة مثل هذه الموضوعات.\u003c/li\u003e\n\u003cli\u003eتجنب نشر المعلومات الشخصية، مثل تفاصيل الاتصال، داخل التعليقات.\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003eيتم تطبيق أي تعديلات أخرى على شروط الاستخدام فور الإعلان ما لم ينص على خلاف ذلك.\u003c/h3\u003e\n\u003cp\u003e\u0026nbsp;\u003c/p\u003e\n\u003ch3\u003e\u003cstrong\u003eتسرب البيانات\u003c/strong\u003e: يجب على وكالة الأنباء السعودية إخطار السلطة المختصة بمجرد علمها بتسرب أو تلف البيانات الشخصية أو الوصول غير القانوني. علاوة على ذلك، إذا كان أي سابق من شأنه أن يسبب ضرر جسيم لبياناتك، فسيقوم الكيان بإخطارك على الفور.\u003c/h3\u003e\n\u003ch3\u003e\u0026nbsp;\u003c/h3\u003e\n\u003ch3\u003e\u003cstrong\u003eالتواصل\u003c/strong\u003e: باستثناء المواد التوعوية التي ترسلها الكيانات العامة، لا يجوز لـ البوابة الإلكترونية \"وكالة الأنباء السعودية\" استخدام وسائل الاتصال الشخصية، بما في ذلك عناوينك البريدية والإلكترونية، لإرسال مواد إعلانية أو توعوية، إلا بما يلي:\u003c/h3\u003e\n\u003col\u003e\n\u003cli\u003eيجب أخذ موافقة المتلقي المستهدف لإرسال هذه المواد إليه.\u003c/li\u003e\n\u003cli\u003eيجب على مرسل المواد توفير آلية واضحة، على النحو الذي تحدده اللوائح، تمكن المتلقي المستهدف من التعبير عن رغبته في التوقف عن إرسالها إليه عندما يرغب في ذلك.\u003c/li\u003e\n\u003cli\u003eباستثناء البيانات الحساسة، يمكن معالجة البيانات الشخصية لأغراض التسويق إذا تم جمعها مباشرة من المالك وتم الاتفاق عليها بموجب أحكام القانون.\u003c/li\u003e\n\u003c/ol\u003e\n\u003ch3\u003eعلاوة على ذلك، يمكن جمع بياناتك الشخصية، أو معالجتها لأغراض علمية، أو بحثية، أو إحصائية دون موافقتك، في الحالات التالية فقط:\u003c/h3\u003e\n\u003col\u003e\n\u003cli\u003eإذا كانت البيانات الشخصية لا تتضمن دليلا على هويتك.\u003c/li\u003e\n\u003cli\u003eإذا تم تدمير هويتك أثناء عملية معالجتها وقبل الكشف عنها لأي طرف آخر وهذه البيانات ليست حساسة.\u003c/li\u003e\n\u003cli\u003eإذا كان جمع أو معالجة البيانات الشخصية لهذه الأغراض مطلوبا من قبل نظام آخر أو تنفيذا لاتفاقية سابقة تكون طرفا فيها.\u003c/li\u003e\n\u003c/ol\u003e\n\u003ch3\u003eلا يجوز نسخ الوثائق الرسمية التي تحدد مالك البيانات الشخصية أو نسخها، إلا عندما يكون ذلك تنفيذا لأحكام اللوائح أو عندما تطلب سلطة عامة مختصة تصوير هذه الوثائق أو نسخها على النحو الذي تحدده القواعد.\u003c/h3\u003e\n\u003ch3\u003eباستثناء الحالات الضرورية للغاية للحفاظ على حياتك، أو لمنع العدوى المرضية، أو فحصها، أو علاجها، لا يجوز لوكالة الأنباء السعودية\u0026nbsp;نقل بياناتك الشخصية خارج المملكة أو الكشف عنها إلى وجهة خارج المملكة ما لم يكن ذلك تنفيذا لالتزام بموجب اتفاقية تكون المملكة طرفا فيها، أو لخدمة مصالح المملكة، أو لأغراض أخرى تحددها اللوائح، بعد استيفاء الشروط التالية:\u003c/h3\u003e\n\u003col\u003e\n\u003cli\u003eلا يخل النقل أو الكشف بالأمن القومي أو المصالح الحيوية للمملكة.\u003c/li\u003e\n\u003cli\u003eتوفير ضمانات كافية للحفاظ على البيانات الشخصية التي سيتم نقلها أو الكشف عنها وسريتها بحيث لا تقل معايير حماية البيانات الشخصية عن تلك الواردة في القانون واللوائح.\u003c/li\u003e\n\u003cli\u003eيقتصر النقل أو الكشف على الحد الأدنى من البيانات الشخصية اللازمة.\u003c/li\u003e\n\u003cli\u003eموافقة السلطة المختصة على النقل أو الإفصاح على النحو الذي تحدده اللوائح.\u003c/li\u003e\n\u003cli\u003eباستثناء الشرط المنصوص عليه هنا، يجوز للسلطة المختصة وكالة الأنباء السعودية، على أساس كل حالة على حدة، من الالتزام بأحد الشروط؛ عندما تقيم السلطة المختصة بشكل فردي أو بالاشتراك مع أطراف أخرى أن البيانات الشخصية سيكون لها مستوى مقبول من الحماية خارج المملكة، وهذه البيانات ليست بيانات حساسة.\u003c/li\u003e\n\u003c/ol\u003e\n\u003ch3\u003eتحتفظ هذه البوابة بسجلات لفترة تحددها اللوائح، حيث تتضمن السجلات الحد الأدنى من البيانات التالية:\u003c/h3\u003e\n\u003col\u003e\n\u003cli\u003eتفاصيل الاتصال بالكيان.\u003c/li\u003e\n\u003cli\u003eالغرض من معالجة البيانات الشخصية.\u003c/li\u003e\n\u003cli\u003eفئات موضوعات البيانات الشخصية.\u003c/li\u003e\n\u003cli\u003eالطرف الذي تم الكشف عن البيانات الشخصية له (أو سيتم الكشف عنها).\u003c/li\u003e\n\u003cli\u003eما إذا كانت البيانات الشخصية قد تم نقلها (أو سيتم نقلها) خارج المملكة أو الكشف عنها لطرف خارج المملكة.\u003c/li\u003e\n\u003cli\u003eالفترة المتوقعة للاحتفاظ بالبيانات الشخصية.\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp\u003e\u0026nbsp;\u003c/p\u003e\n\u003ch3\u003e\u003cstrong\u003eالجرائم والعقوبات:\u003c/strong\u003e دون الإخلال بأي عقوبة أشد ينص عليها في نظام آخر، ووفقا لنظام حماية البيانات الشخصية تكون عقوبة ارتكاب الجرائم التالية:\u003c/h3\u003e\n\u003cul\u003e\n\u003cli\u003eيعاقب بالسجن لمدة لا تتجاوز (سنتان) وغرامة لا تتجاوز (ثلاثة ملايين) ريال، أو إحدى هاتين العقوبتين إذا كان ذلك بقصد الإضرار بمن يملك البيانات أو تحقيق منفعة شخصية.\u003c/li\u003e\n\u003cli\u003eيعاقب بالسجن لمدة لا تتجاوز (سنة واحدة) وغرامة لا تتجاوز (مليون) ريال أو إحدى هاتين العقوبتين كل من يخالف أحكام نقل البيانات الشخصية أو الكشف عنها خارج المملكة.\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003eفي حين لا يوجد حكم خاص من أحكام القانون، ودون الإخلال بأي عقوبة أشد ينص عليها قانون آخر، يعاقب كل شخص ذي طبيعة خاصة أو قانونية - مشمولة بأحكام القانون - ينتهك أيا من أحكام القانون أو اللوائح بالإنذار أو بغرامة لا تتجاوز خمسة ملايين ريال. يمكن مضاعفة عقوبة الغرامة في حالة المخالفة المتكررة، حتى لو تجاوزت الحد الأقصى لها إذا لم تتجاوز ضعف هذا الحد.\u003c/h3\u003e\n\u003ch3\u003eتختص النيابة العامة بالتحقيق والمقاضاة أمام المحكمة المختصة بشأن هذه الانتهاكات. تنظر المحكمة المختصة في القضايا الناشئة عن تطبيق هذه المادة وفرض العقوبات المنصوص عليها.\u003c/h3\u003e\n\u003ch3\u003eتكون اللجنة (أو أكثر) التي لا يقل أعضاؤها عن (ثلاثة)، ويسمى أحدهم رئيسا، بما في ذلك مستشار شرعي أو قانوني، مسؤولة عن النظر في الانتهاكات وفرض عقوبة الإنذار أو الغرامة المنصوص عليها هنا، وفقا لنوع المخالفة المرتكبة وخطورتها ومدى تأثيرها، شريطة أن يصدر قرار رئيس السلطة المختصة بقراره قواعد عمل اللجنة، التي تحدد فيها أجور أعضائها. يحق لأي شخص ضد قرار اللجنة الاستئناف أمام محكمة مختصة.\u003c/h3\u003e\n\u003ch3\u003eمع عدم الإخلال بأحكام القانون هذه، تحاسب وكالة الأنباء السعودية أي من موظفيه - تأديبيا - في حالة انتهاكهم لأي من أحكام القانون واللوائح، وفقا لأحكام وإجراءات المساءلة والانضباط المنصوص عليها في القانون.\u003c/h3\u003e\n\u003ch3\u003eمع عدم الإخلال بالعقوبة المفروضة في القانون، يحق لكل من عانى من ضرر بسبب ارتكاب أي من المخالفات المنصوص عليها في القانون أو اللوائح المطالبة أمام المحكمة المختصة بالتعويض عن الأضرار المادية أو المعنوية بما يتناسب مع مدى الضرر.\u003c/h3\u003e\n\u003ch3\u003eعلاوة على ذلك، فإن أي شخص بدأ عملا في معالجة البيانات الشخصية ملزم بالحفاظ على الأسرار المتعلقة بالبيانات حتى بعد انتهاء وظيفته أو علاقته التعاقدية.\u003c/h3\u003e\n\u003cp\u003e\u0026nbsp;\u003c/p\u003e\n\u003ch2\u003eإخلاء المسؤولية\u003c/h2\u003e\n\u003ch3\u003eتنطبق سياسة الخصوصية وحماية البيانات هذه على البوابة الإلكترونية لوكالة الأنباء السعودية فقط. يجب عليك قراءة سياسة الخصوصية وحماية البيانات بعناية عند النقل إلى موقع ويب آخر من خلال هذه البوابة.\u003c/h3\u003e\n\u003ch3\u003eلا تخل أحكام وإجراءات القانون بأي حكم يمنح حق مالك البيانات الشخصية أو يقرر حمايتها بشكل أفضل، المنصوص عليه في نظام آخر أو اتفاقية دولية تكون المملكة طرفا فيها.\u003c/h3\u003e\n\u003ch3\u003e\u0026nbsp;\u003c/h3\u003e\n\u003ch3\u003e\u003cstrong\u003eلا مسؤولية:\u003c/strong\u003e تم إعداد البوابة للامتثال للوائح الحالية في المملكة العربية السعودية. بموجب هذا القرار، لا يمكن لوكالة الأنباء السعودية أن يضمن:\u003c/h3\u003e\n\u003cul\u003e\n\u003cli\u003eدقة وموثوقية المعلومات.\u003c/li\u003e\n\u003cli\u003eالاستجابة للهجوم الخارجي أو القرصنة الخارجية.\u003c/li\u003e\n\u003cli\u003eالاستدامة أو الفعالية.\u003c/li\u003e\n\u003cli\u003eملاءمة محتوي البوابة.\u003c/li\u003e\n\u003cli\u003eلن تحتوي البوابة ولا الخادم على فيروسات أو عناصر ضارة أخرى.\u003c/li\u003e\n\u003cli\u003eلا يجوز اعتبار أي من وكالة الأنباء السعودية أو أي جهة حكومية أخرى مسؤولة قانونا عن الخسارة أو الضرر المباشر أو غير المباشر الذي قد ينجم عن استخدام البوابة.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u0026nbsp;\u003c/p\u003e\n\u003ch3\u003e\u003cstrong\u003eالاستخدام على مسؤوليتك الخاصة:\u003c/strong\u003e تحتوي البوابة على روابط لمواقع ويب أخرى لا تخضع لمشرفي وكالة الأنباء السعودية وبالتالي فهي ليست مسؤولة عن محتوى تلك المواقع. أي أخطار تنشأ عن تصفح المواقع من خلال الروابط المقدمة على البوابة هي مسؤولية المستخدم.\u003c/h3\u003e\n\u003ch3\u003eتحتوي البوابة على روابط لمواقع ويب أو بوابات أخرى قد تحاول حماية المعلومات والخصوصية باستخدام أدوات مختلفة عن تلك التي تستخدمها البوابة؛ وبالتالي، نحن لسنا مسؤولين عن المحتوى أو وسائل حماية الخصوصية المستخدمة. ننصح المستخدمين بمراجعة سياسات الخصوصية لهذه المواقع.\u003c/h3\u003e\n\u003ch3\u003eتستخدم بعض مواقع وكالة الانباء السعودية ملفات تعريف الارتباط؛ وتمنح هذه الملفات المستخدمين حق الوصول الكامل إلى مواقع الويب. إذا رغبت في ذلك، يمكن استخدام ملفات تعريف الارتباط لتذكر كلمات المرور وتبسيط الوصول إلى موقع الويب. يتم تخزين ملفات تعريف الارتباط على القرص الصلب للحاسوب الخاص بالمستخدم إذا تم قبولها وترميزها.\u003c/h3\u003e\n\u003ch3\u003e\u0026nbsp;\u003c/h3\u003e\n\u003ch3\u003e\u003cstrong\u003eحدود المسؤولية:\u003c/strong\u003e يقر المستخدمون بموجب هذا بإدراكهم بأنه يمكن التجسس على الاتصالات عبر الإنترنت أو اختراقها من قبل أطراف أخرى. وكما تم تأكيده، يدرك المستخدمون أن البوابة لن تغير المعلومات التي توفرها الوكالات الحكومية الرسمية، بالإضافة إلى ذلك، يمكن أيضا تقديم جميع الطلبات والإجراءات الإدارية عبر الإنترنت مباشرة وتنفيذها شخصيا.\u003c/h3\u003e\n\u003ch3\u003eلا تتحمل البوابة أي مسؤولية عن أي خسارة أو ضرر قد يعاني منه المستخدمون من استخدام البوابة وزيارتها، بما في ذلك نتيجة لأي معلومات أو بيان أو عرض معلن عنه.\u003c/h3\u003e\n\u003ch3\u003eعلاوة على ذلك، فإن البوابة ليست مسؤولة عن أي مشاكل قد تنشأ في الوصول إلى الإنترنت وأي أضرار تلحق بالآلات أو البرامج، ولا يمكن مساءلتها عن أي سوء سلوك أو تعليق ضار أدلى به مستخدمون آخرون قاموا بتسجيل الدخول إليها.\u003c/h3\u003e\n\u003ch3\u003e\u003cstrong\u003e\u0026nbsp;\u003c/strong\u003e\u003c/h3\u003e\n\u003ch3\u003e\u003cstrong\u003eالحماية من الفيروسات:\u003c/strong\u003e يجب على المستخدمين الاستفادة من برامج مكافحة الفيروسات المناسبة عند محاولة تنزيل أي محتوى من البوابة. نحن لسنا مسؤولين عن أي خسارة أو ضرر يلحق بالبيانات أو كمبيوتر المستخدم الذي قد ينشأ أثناء استخدام هذه البوابة أو أي من محتواها.\u003c/h3\u003e\n\u003ch3\u003e\u003cstrong\u003e\u0026nbsp;\u003c/strong\u003e\u003c/h3\u003e\n\u003ch3\u003e\u003cstrong\u003eالتنازل عن المطالبات:\u003c/strong\u003e البوابة الإلكترونية \"وكالة الأنباء السعودية\" وجميع خدماتها ومصادر المعلومات والمواد الأخرى هي للاستخدام الشخصي دون إقرار أو ضمان. البوابة ليست مسؤولة عن الأخطاء أو التجاوزات التي قد تنشأ بسبب استخدام محتواها أو روابطها، سواء كانت معروفة أو غير معروفة.\u003c/h3\u003e\n\u003ch3\u003eأي اتصال أو معلومات يرسلها المستخدمون من البوابة ليست من حيازة المرسل ولا مضمونة فيما يتعلق بالخصوصية. بالإضافة إلى ذلك، فإن أي استخدام تفاعلي من قبل مستخدمي البوابة لا يضمن أي حقوق أو تراخيص أو امتيازات.\u003c/h3\u003e\n\u003ch3\u003e\u0026nbsp;\u003c/h3\u003e\n\u003ch3\u003e\u003cstrong\u003eالتعويضات:\u003c/strong\u003e يقر المستخدمون بموجب هذا بعدم التصرف أبدا ضد وكالة الأنباء السعودية، بما في ذلك جميع الادارات أو الموظفين أو الوكلاء المعتمدين المسؤولين عن إدارة أو تحديث البوابة الإلكترونية \"وكالة الأنباء السعودية\". يعتبر هذا البند إعفاء قانونيا من الالتزامات أو المسؤوليات المتعلقة بالمطالبات الناتجة عن انتهاك المستخدم للشروط أو شروط الاستخدام أو اللوائح الأخرى ذات الصلة داخل المملكة العربية السعودية وخارجها.\u003c/h3\u003e\n\u003ch3\u003e\u0026nbsp;\u003c/h3\u003e\n\u003ch2\u003eإشعار حقوق الطبع والنشر\u003c/h2\u003e\n\u003ch3\u003eتخضع هذه البوابة لإشراف وكالة الانباء السعودية، وهي جهة حكومية \"تعد وكالة الأنباء السعودية التي تأسست في عام 1971م، المصدر الأول لتغطية الأخبار والفعاليات المحلية التي تهم المواطن والمقيم، وتقدم محتوى إعلامي بعدة لغات يتسم بالدقة والسرعة وفق أفضل الممارسات المهنية الإعلامية، وبأحدث تقنيات التواصل المؤثرة، وتسعى لتكون صوت المملكة العربية السعودية المؤثر عربياً وإسلامياً وعالمياً\".\u003c/h3\u003e\n\u003ch3\u003eجميع المحتويات المتاحة على البوابة الإلكترونية \"وكالة الأنباء السعودية\" محمية بموجب القواعد واللوائح الوطنية المتعلقة بالمنشورات والأسماء التجارية وحقوق الملكية الفكرية. جميع حقوق الملكية الفكرية المتعلقة بمحتوى البوابة محمية وتعتبر ملكا لوكالة الأنباء السعودية.\u003c/h3\u003e\n\u003ch3\u003eما لم ينص على خلاف ذلك، لا يسمح للمستخدمين ببيع، أو ترخيص، أو تأجير، أو تعديل، أو نسخ، أو إعادة إنتاج، أو تنزيل، أو نشر، أو نقل، أو توزيع، \"الأخبار والفعاليات المحلية والصور والوسائط والمحتوى الإعلامي بالبوابة\".\u003c/h3\u003e\n\u003ch3\u003eيحظر تغيير أو تعديل أي من محتوى البوابة. بالإضافة إلى ذلك، فإن جميع الصور والوسائط المضمنة في البوابة محمية بموجب حقوق الطبع والنشر، ولا يسمح بنسخ أو استخدام هذا المحتوى دون موافقة خطية مسبقة من وكالة الانباء السعودية.\u003c/h3\u003e\n\u003ch3\u003e\u003cstrong\u003eالاختصاص القضائي\u003c/strong\u003e: يوافق المستخدمون بموجب هذا على الامتثال حصريا للاختصاص القضائي للمملكة العربية السعودية بشأن أي قضية أو نزاع ينشأ بسبب استخدام هذه البوابة.\u003c/h3\u003e\n\u003cp\u003e\u0026nbsp;\u003c/p\u003e\n\u003ch2\u003eتحديثات سياسة الخصوصية وحماية البيانات\u003c/h2\u003e\n\u003ch3\u003eيحق لوكالة الأنباء السعودية\u0026nbsp;تحديث وتغيير سياسة الخصوصية وحماية البيانات الخاصة بها حسب الحاجة. سنقوم بتحديث هذه السياسة عندما تتغير ممارسات معالجة البيانات والمعلومات الخاصة بنا.\u003c/h3\u003e\n\u003cp\u003e\u0026nbsp;\u003c/p\u003e\n\u003ch2\u003eاتصل بنا\u003c/h2\u003e\n\u003ch3\u003eإذا كان لديك أي أسئلة حول سياسة الخصوصية وحماية البيانات الخاصة بنا، أو كنت بحاجة إلى مساعدة، أو شكوى، فيرجى إخبارنا بذلك من خلال الدخول على صفحة\u0026nbsp;\u003ca href=\"https://www.spa.gov.sa/contact-us\"\u003eتواصل معنا\u0026nbsp;\u003c/a\u003e.\u003c/h3\u003e\n\u003cp\u003e\u0026nbsp;\u003c/p\u003e\n\u003ch2\u003eلوائح حماية البيانات الشخصية\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://laws.boe.gov.sa/boelaws/laws/lawdetails/b7cfae89-828e-4994-b167-adaa00e37188/1\"\u003eقانون حماية البيانات الشخصية.\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://sdaia.gov.sa/ndmo/Files/Policies001.pdf\"\u003eضوابط ومواصفات إدارة البيانات الوطنية وحوكمتها وحماية البيانات الشخصية.\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/25df73d6-0f49-4dc5-b010-a9a700f2ec1d/1\"\u003eقانون مكافحة الجرائم الإلكترونية.\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://sdaia.gov.sa/ndmo/Files/PoliciesAr.pdf\"\u003eسياسات حوكمة البيانات الوطنية.\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://sdaia.gov.sa/ndmo/Files/Policies002.pdf\"\u003eسياسة حماية البيانات الشخصية للأطفال ومن في حكمهم.\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://sdaia.gov.sa/ndmo/Files/Policies003.pdf\"\u003eالقواعد العامة لنقل البيانات الشخصية خارج الحدود الجغرافية للمملكة.\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u0026nbsp;\u003c/p\u003e\n\u003ch2\u003eالتشريعات واللوائح الأخرى ذات الصلة\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://sdaia.gov.sa/ar/SDAIA/about/Documents/PersonalData.pdf\"\u003eسياسة حماية البيانات الشخصية\u003c/a\u003e\u0026nbsp;: الهيئة السعودية للبيانات والذكاء الاصطناعي.\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.ncsc.gov.sa/wps/wcm/connect/ncsc/ac788179-3123-47b0-825d-6f2fe266a17f/ECC.pdf?MOD=AJPERES\u0026amp;CVID=mqr3nQH\"\u003eالضوابط الأساسية للأمن السيبراني\u003c/a\u003e\u0026nbsp;: الهيئة الوطنية للأمن السيبراني.\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2\u003eسياسة حماية خصوصية الأطفال وغير الأكفاء\u003c/h2\u003e\n\u003ch3\u003eتحدد\u0026nbsp;\u003ca href=\"https://sdaia.gov.sa/ndmo/Files/Policies002.pdf\"\u003eسياسة حماية خصوصية الأطفال\u003c/a\u003e\u0026nbsp;وغير الأكفاء الأساس القانوني للحفاظ على الأطفال وحماية حقوقهم فيما يتعلق بجمع بياناتهم الشخصية ومعالجتها بأي وسيلة. تتوافق السياسة مع أحكام لائحة حماية البيانات واتفاقية الأمم المتحدة لحقوق الطفل وبروتوكولاتها الاختيارية. الأهداف هي حماية الأطفال من:\u003c/h3\u003e\n\u003cul\u003e\n\u003cli\u003eالآثار السلبية للمحتوى غير اللائق والإعلانات المنتشرة على الإنترنت.\u003c/li\u003e\n\u003cli\u003eمساعدة السلطات المختصة على حماية الأطفال من المخاطر المحتملة - العنف، أو الإساءة أو الإساءة أو التهديد أو الأذى أو الاستغلال، الناتجة عن جمع ومعالجة بياناتهم الشخصية من خلال المواقع الإلكترونية والتطبيقات الرقمية.\u003c/li\u003e\n\u003cli\u003eإيجاد توازن بين الآثار السلبية والمخاطر المحتملة والحاجة إلى جمع ومعالجة البيانات الشخصية للأطفال.\u003c/li\u003e\n\u003cli\u003eتنطبق أحكام السياسة على جميع الكيانات (العامة والخاصة وغير الربحية) في المملكة التي تجمع وتعالج البيانات الشخصية للأطفال، سواء كانت يدوية أو إلكترونية. تنطبق الأحكام أيضا على جميع الكيانات خارج المملكة التي تجمع البيانات الشخصية للأطفال المقيمين في المملكة عبر الإنترنت.\u003c/li\u003e\n\u003cli\u003eالقواعد العامة لنقل البيانات الشخصية خارج المملكة.\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003eتضع\u0026nbsp;\u003ca href=\"https://sdaia.gov.sa/ndmo/Files/Policies003.pdf\"\u003eالقواعد العامة لنقل البيانات الشخصية\u003c/a\u003e\u0026nbsp;خارج المملكة قواعد ومعايير نقل البيانات الشخصية خارج الحدود الجغرافية للمملكة لضمان الحفاظ على السيادة الوطنية على هذه البيانات، وكذلك الحفاظ على خصوصية مالكي البيانات الشخصية وحماية حقوقهم من خلال تحديد التزامات مسؤولين الخصوصية والمعالجين فيما يتعلق بنقل البيانات الشخصية خارج المملكة. تنطبق أحكام هذه الوثيقة على جميع الكيانات (العامة والخاصة وغير الربحية) في المملكة التي تنقل البيانات الشخصية إلى أطراف أخرى خارج الحدود الجغرافية للمملكة لغرض المعالجة.\u003c/h3\u003e\n\u003cp\u003e\u0026nbsp;\u003c/p\u003e","privacy_en":"\u003cp\u003e\u003cstrong\u003ePrivacy and Data Protection\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003eThe Saudi Press Agency understands the importance of your privacy and personal data; Therefore, we are committed to keeping all important information and data of all users safe, secure and confidential.\u003c/p\u003e\n\u003cp\u003eThe Saudi Press Agency's privacy policy and e-portal procedures are subject to the Personal Data Protection Law (Royal Decree No. (M/19) dated 09/02/1443H), the main principles for the protection of personal information and the main principles and general rules for data exchange issued by the \u003ca href=\"https://sdaia.gov.sa/en/default.aspx\"\u003eSaudi Data and Artificial Intelligence Authority\u003c/a\u003e and \u003ca href=\"https://sdaia.gov.sa/en/Sectors/Ndmo/Pages/default.aspx\"\u003ethe National Data Management Office\u003c/a\u003e.\u003c/p\u003e\n\u003cp\u003eThe Personal Data Protection Law and its implementing regulations establish the legal basis for protecting your rights regarding the processing of personal data by all entities in the Kingdom, as well as all entities outside the Kingdom that process personal data related to individuals residing in the Kingdom. By any means, including processing personal data online.\u003c/p\u003e\n\u003cp\u003eThe basic principles of our data protection policy include:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eAccountability of the entity head (or his/her representative) for the privacy policies and procedures of the data controller.\u003c/li\u003e\n\u003cli\u003eTransparency through a privacy notice indicating the purposes for which personal data is collected.\u003c/li\u003e\n\u003cli\u003eChoice and consent obtained through implied or explicit consent regarding the collection, use and disclosure of personal data prior to its collection.\u003c/li\u003e\n\u003cli\u003eLimiting data collection to the minimum amount of data that enables the purposes to be achieved.\u003c/li\u003e\n\u003cli\u003eUse, retain and destroy strictly for the intended purpose, retain it for as long as necessary to achieve the intended purposes or as required by laws and regulations and destroy it securely, preventing leakage, loss, theft, misuse or unauthorized access.\u003c/li\u003e\n\u003cli\u003eAccess to data through which any data subject can review and update their personal data and correct it.\u003c/li\u003e\n\u003cli\u003eRestrictions on disclosure of data approved by the data subject restrict third parties to the purposes set out in the privacy notice.\u003c/li\u003e\n\u003cli\u003eData security by protecting personal data from leakage, damage, loss, theft, misuse, modification or unauthorized access; In accordance with the controls issued by the National Cybersecurity Authority and other relevant authorities.\u003c/li\u003e\n\u003cli\u003eData quality after verifying its accuracy, completeness and timeliness.\u003c/li\u003e\n\u003cli\u003eMonitoring and compliance with the data controller's privacy policies and procedures, and any inquiries, complaints and disputes related to privacy.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u0026nbsp;\u003c/p\u003e\n\u003cp\u003eThe National Data Management and Personal Data Protection Standards cover 15 areas of data management and personal data protection. The standards apply to all government data regardless of form or type, including paper records, emails, data stored in electronic form, audio recordings, video clips, maps, images, text programs, handwritten documents or other recorded data.\u003c/p\u003e\n\u003cp\u003eThe application of the provisions of the Personal Data Protection Law and its executive regulations does not prejudice the powers and tasks of the National Cybersecurity Authority as a security authority specializing in cybersecurity and its affairs in the Kingdom.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e\u0026nbsp;\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e\u0026nbsp;\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003ePrivacy and Data Protection Agreement\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003eAs a user of the electronic portal and its application, you accept the privacy and data protection policies and regulations Data in the Kingdom of Saudi Arabia, which controls the portal and its application. This agreement becomes effective immediately upon first use or access to the portal.\u003c/p\u003e\n\u003cp\u003eIf you do not agree to this policy, you must not use any of the services of the Saudi Press Agency e-portal.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e\u0026nbsp;\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eCollection of user data\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003eThe purpose of collecting personal data is directly related to the purposes of the e-portal and does not conflict with any specific provision. The methods and means of collecting personal information are appropriate to the owner's circumstances, direct, clear, secure, and free from deception, misleading information or blackmail. If it becomes clear that the personal data collected is no longer necessary to achieve the purpose of its collection, the Saudi Press Agency e-portal will stop hoarding it and destroy the previously collected data immediately. Read more\u003c/p\u003e\n\u003cp\u003eThe Saudi Press Agency e-portal will ensure that the following criteria are met before collecting your data Personal:\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003eJustification for collecting your personal data.\u003c/li\u003e\n\u003cli\u003eThe purpose of collecting your personal data, whether all or part of it, is mandatory or optional, with further information about the processing of data that does not conflict with the purpose of its collection or is otherwise provided for by law.\u003c/li\u003e\n\u003cli\u003eThe identity and reference address of the collector of the personal data where applicable, unless for security purposes.\u003c/li\u003e\n\u003cli\u003eThe entity or entities to which the personal data will be disclosed and a description of whether the personal data will be transferred, disclosed or processed outside the Kingdom.\u003c/li\u003e\n\u003cli\u003eThe potential effects and risks of non-compliance with the personal data collection procedure.\u003c/li\u003e\n\u003cli\u003eYour privacy and data protection rights as stipulated in the law.\u003c/li\u003e\n\u003cli\u003eOther elements specified by the regulations depending on the nature of the activity carried out by this entity.\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp\u003e\u0026nbsp;\u003c/p\u003e\n\u003cp\u003eIn the event of collecting personal data from non-owners, the following conditions will be met:\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003eIf the owner of the personal data has consented to do so, in accordance with the provisions of the law.\u003c/li\u003e\n\u003cli\u003eIf the personal data is available To the public or collected from a publicly available source.\u003c/li\u003e\n\u003cli\u003eIf the entity is a public entity, and the collection of personal data is not directly owned or processed for a purpose other than the purpose for which it was collected, it is required for security purposes or to implement another system or to meet judicial requirements in accordance with the provisions specified in the regulations.\u003c/li\u003e\n\u003cli\u003eIf compliance with this prohibition may harm the owner of the personal data or affect his vital interests, through the provisions specified in the regulations.\u003c/li\u003e\n\u003cli\u003eIf the collection or processing of personal data is necessary to protect the health, public safety, or the life or health of a specific individual or individuals.\u003c/li\u003e\n\u003cli\u003eIf the personal data is not recorded or stored in a format that makes it possible to identify its owner and identify him directly or indirectly.\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp\u003e\u0026nbsp;\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eWhat data do we collect?\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003eWhen you visit the Saudi Press Agency's electronic portal, our servers automatically collect your IP address and collect information about the user's browser, search engine, geographic location, date and time of the URL.\u003c/p\u003e\n\u003cp\u003eIt includes any process carried out on personal data by any means, whether manual or automated, including collection, recording, saving, indexing, arranging, formatting, storing, modifying, updating, integration, retrieval, use, disclosure, transfer, publication, data sharing or interconnection, blocking, scanning, and destruction.\u003c/p\u003e\n\u003cp\u003eCookies are files saved on your phone, tablet or computer when you visit the Saudi Press Agency's electronic portal.\u003c/p\u003e\n\u003cp\u003e\u0026nbsp;\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eWhy do we need your data?\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003eUsing the IP address helps us solve any technical problems that arise on our servers, including statistics about the use of the portal (such as the number of visitors, the language of the computer used, etc. To that end). The geolocation of users will benefit from the availability of specific services on its platform and application.\u003c/p\u003e\n\u003cp\u003eCookies enhance your use of the portal and better understand your needs. Therefore, we use cookies to collect and store information about how you use the Saudi Press Agency e-portal and government digital services.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e\u0026nbsp;\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eHow do we process and store personal data?\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003eYour personal data will not be processed without taking sufficient steps to verify its accuracy, completeness, timeliness and relevance for the purpose for which it was collected in accordance with the provisions of the regulations.\u003c/p\u003e\n\u003cp\u003eThe Saudi Press Agency e-portal applies the highest security standards to protect data and information. Sensitive data and any data that must be kept confidential under legal requirements are encrypted and subject to additional controls and procedures. Sensitive data includes the individual's ethnic or tribal origin, religious, intellectual or political belief, or indicates membership in civil associations or institutions, in addition to criminal and security data and biometric data that identifies genetic data Insurance data, health data, location data, credit data, and data indicating that one or both of the individual's parents are unknown.\u003c/p\u003e\n\u003cp\u003eOur technical staff is allowed to handle specific information to provide the Saudi Press Agency's e-portal services that are consistent with your needs. We never allow any other party to know your IP address other than the Saudi Press Agency's e-portal technical team.\u003c/p\u003e\n\u003cp\u003eIn exceptional circumstances, your information may be made available to government officials; however, it will never be made available to the public without your prior consent. Furthermore, this information will not be circulated, exchanged or sold to any third party without your prior consent.\u003c/p\u003e\n\u003cp\u003eYour personal data will only be disclosed in the following cases:\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003eIf you agree to its disclosure in accordance with the provisions of the law.\u003c/li\u003e\n\u003cli\u003eIf your personal data is collected from a publicly available source.\u003c/li\u003e\n\u003cli\u003eIf the party requesting the disclosure is a public entity, for security purposes, to implement another system, or to meet judicial requirements in accordance with the provisions specified in the regulations.\u003c/li\u003e\n\u003cli\u003eIf the disclosure is necessary to protect public health, public safety, or the life or health of a specific individual or individual.\u003c/li\u003e\n\u003cli\u003eIf the disclosure is limited to its subsequent processing in a manner that does not lead to the identification of the owner of the personal data or any other individual specifically.\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp\u003e\u0026nbsp;\u003c/p\u003e\n\u003cp\u003eThe Saudi Press Agency may not disclose your personal data if the disclosure leads to any of the following:\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003eIt represents a threat to security or harms the reputation of the Kingdom Or conflicts with its interests\u003c/li\u003e\n\u003cli\u003eIt affects the Kingdom's relations with other countries\u003c/li\u003e\n\u003cli\u003eIt prevents the disclosure of a crime or violates the rights of the accused to a fair trial, or affects the integrity of existing criminal proceedings.\u003c/li\u003e\n\u003cli\u003eIt endangers the safety of the individual or individuals\u003c/li\u003e\n\u003cli\u003eIt involves a violation of the privacy of an individual other than the owner of the personal data as determined by the regulations\u003c/li\u003e\n\u003cli\u003eIt conflicts with an incomplete or incapable interest\u003c/li\u003e\n\u003cli\u003eIt violates established professional obligations\u003c/li\u003e\n\u003cli\u003eIt involves a breach of an obligation, procedure or judicial ruling\u003c/li\u003e\n\u003cli\u003eIt reveals a confidential source of information that the public interest should not disclose\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp\u003e\u0026nbsp;\u003c/p\u003e\n\u003cp\u003eThe Saudi Press Agency will dispose of your personal data once the purpose of its collection has ended. However, it may retain this data after the purpose of its collection has ended if everything that leads to specific knowledge of the owner has been removed in accordance with the controls specified in the regulations.\u003c/p\u003e\n\u003cp\u003eThe Saudi Press Agency retains personal data even after the purpose of its collection has ended in the following cases Only:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eIf there is a systematic justification that it must be kept for a specific period, in which case it must be destroyed after the end of this period or the end of the purpose for which it was collected, whichever is longer.\u003c/li\u003e\n\u003cli\u003eIf the personal data is closely related to a case before a judicial body and its retention is required for this purpose, in which case it is destroyed after the completion of the judicial proceedings for the case.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003e\u0026nbsp;\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eTerms of Use\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003e\u0026nbsp;The Saudi Press Agency's electronic portal\u0026nbsp;is available to all users. By accessing this portal, you and the site users are deemed to agree and agree to all terms of use, including all applicable laws and regulations in the Kingdom of Saudi Arabia.\u003c/p\u003e\n\u003cp\u003eAs a registered user, you have the full right to:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eAccess information\u003c/li\u003e\n\u003cli\u003eObtain information\u003c/li\u003e\n\u003cli\u003eCorrect or modify information\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u0026nbsp;\u003c/p\u003e\n\u003cp\u003eWithdraw the agreement and delete information by contacting us through the Contact Us page. You have the right to, as a user who owns personal data, you must know (including reporting) the official or practical justification that was considered for collecting your personal data, and not to process your data later in a manner that is inconsistent with the purpose of its collection or otherwise. You have the right to request the destruction of your personal data available to us without prejudice to the provisions of the law.\u003c/p\u003e\n\u003cp\u003e\u0026nbsp;\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eUser Restrictions:\u003c/strong\u003e \u003cstrong\u003eBy accessing this portal, you agree to avoid:\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003eProviding or uploading files that contain unlicensed programs, materials, or data, or any other information or files that may contain viruses\u003c/p\u003e\n\u003cp\u003eUsing this portal to send any commercial or unsolicited email or misusing the portal in any other way Publishing, advertising, distributing, or circulating defamatory or infringing materials and information, and any other unacceptable materials or executable information\u003c/p\u003e\n\u003cp\u003eUsing this portal to participate in any illegal or unlawful activities in the Kingdom of Saudi Arabia\u003c/p\u003e\n\u003cp\u003eUsing the portal to advertise any product or service that may lead to a violation of laws or rules in the Kingdom by using any tool, program, or procedure that interrupts or may interrupt the operation of the portal\u003c/p\u003e\n\u003cp\u003eDoing any action that places an unreasonable load or requires large storage on the portal's infrastructure.\u003c/p\u003e\n\u003cp\u003e\u0026nbsp;\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eTermination of use: \u003c/strong\u003eWe have the authority, at our sole discretion, to limit the user's right to log in or suspend or terminate his use without prior notice and for any reason, including violation of the terms of use or any action that we may consider illegal or causes harm to others. You will not be allowed to log in to the portal during such termination.\u003c/p\u003e\n\u003cp\u003eExcept for the circumstances provided by law, personal data may not be processed, or the purpose of its processing changed, except with the consent of the owner. The regulations specify the conditions for consent, the circumstances in which consent must be in writing, and the terms and conditions related to obtaining the consent of the legal guardian if the owner of the personal data is incomplete or incapable. However, consent may not be a condition for providing a service or benefit unless the service or benefit is related to the processing of the approved personal data.\u003c/p\u003e\n\u003cp\u003eStandards for comments and electronic participation: All comments in electronic participation channels or on social networks are carefully reviewed to ensure that users comply with the standards and regulations related to making comments. The platform administration has This has the authority to exclude any comments deemed inappropriate, and users are required to:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eObserve public ethics and avoid any inappropriate expressions or use of impolite words.\u003c/li\u003e\n\u003cli\u003eKeep comments relevant and focused on the issue under discussion.\u003c/li\u003e\n\u003cli\u003eAvoid fanaticism and personal criticism that does not enrich the discussion.\u003c/li\u003e\n\u003cli\u003eMake sure of their accuracy when referring to Quranic texts or religious opinions and allow only specialists to discuss such topics.\u003c/li\u003e\n\u003cli\u003eAvoid publishing personal information, such as contact details, within comments.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u0026nbsp;\u003c/p\u003e\n\u003cp\u003eAny other amendments to the Terms of Use will be applied immediately upon announcement unless otherwise stated.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e\u0026nbsp;\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eData Leakage:\u003c/strong\u003e The Saudi Press Agency must notify the competent authority as soon as it becomes aware of the leakage or corruption of personal data or illegal access. Furthermore, if any of the above causes serious harm to your data, the entity will notify you immediately.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e\u0026nbsp;\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eCommunication:\u003c/strong\u003e Except for awareness materials Sent by public entities, the Saudi Press Agency's e-portal may not use personal communication means, including your postal and electronic addresses, to send advertising or awareness materials, except as follows:\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003eThe consent of the intended recipient must be obtained to send such materials to him.\u003c/li\u003e\n\u003cli\u003eThe sender of the materials must provide a clear mechanism, as specified by the regulations, that enables the intended recipient to express his desire to stop sending them to him when he wishes.\u003c/li\u003e\n\u003cli\u003eExcept for sensitive data, personal data may be processed for marketing purposes if it is collected directly from the owner and agreed upon in accordance with the provisions of the law.\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp\u003e\u0026nbsp;\u003c/p\u003e\n\u003cp\u003eFurthermore, your personal data may be collected or processed for scientific, research, or statistical purposes without your consent, only in the following cases:\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003eIf the personal data does not include evidence of your identity\u003c/li\u003e\n\u003cli\u003eIf your identity is destroyed during the processing process and before it is disclosed to any other party and this data is not sensitive.\u003c/li\u003e\n\u003cli\u003eIf The collection or processing of personal data for these purposes is required by another system or in implementation of a previous agreement to which it is a party.\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp\u003e\u0026nbsp;\u003c/p\u003e\n\u003cp\u003eOfficial documents identifying the owner of personal data may not be copied or duplicated, except when this is in implementation of the provisions of the regulations or when a competent public authority requests that these documents be photographed or duplicated as specified by the rules.\u003c/p\u003e\n\u003cp\u003eExcept in cases that are absolutely necessary to preserve your life, or to prevent, examine, or treat disease infections, the Saudi Press Agency may not transfer your personal data outside the Kingdom or disclose it to a destination outside the Kingdom unless this is in implementation of an obligation under an agreement to which the Kingdom is a party, or to serve the interests of the Kingdom, or for other purposes specified by the regulations, after meeting the following conditions:\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003eThe transfer or disclosure does not prejudice national security or the vital interests of the Kingdom.\u003c/li\u003e\n\u003cli\u003eProviding adequate guarantees to preserve the personal data that will be transferred or disclosed and its confidentiality so that the standards for protecting personal data are no less than those stipulated in the law and regulations.\u003c/li\u003e\n\u003cli\u003eThe transfer or disclosure is limited to Minimum personal data required.\u003c/li\u003e\n\u003cli\u003eApproval of the competent authority for the transfer or disclosure as determined by the regulations.\u003c/li\u003e\n\u003cli\u003eExcept for the condition stipulated herein, the competent authority may, on a case-by-case basis, require the Saudi Press Agancy to comply with one of the conditions; When the competent authority assesses individually or jointly with other parties that personal data will have an acceptable level of protection outside the Kingdom, and this data is not sensitive data.\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp\u003e\u0026nbsp;\u003c/p\u003e\n\u003cp\u003eThis portal keeps records for a period specified by the regulations, where the records include the following minimum data:\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003eEntity contacts details\u003c/li\u003e\n\u003cli\u003ePurpose of processing personal data\u003c/li\u003e\n\u003cli\u003eCategories of personal data subjects.\u003c/li\u003e\n\u003cli\u003eThe party to whom the personal data has been disclosed (or will be disclosed).\u003c/li\u003e\n\u003cli\u003eWhether the personal data has been transferred (or will be transferred) outside the Kingdom or disclosed to a party outside the Kingdom.\u003c/li\u003e\n\u003cli\u003eExpected period for retention of personal data.\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp\u003e\u0026nbsp;\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eCrimes and penalties:\u003c/strong\u003e Without prejudice to any more severe penalty stipulated in another system, and according to the Personal Data Protection System, the penalty for committing the following crimes shall be:\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003ePenalty shall be imprisonment for a period not exceeding (two years) and a fine not exceeding (Three million) riyals, or one of these two penalties if it is intended to harm the person who owns the data or achieve personal benefit.\u003c/li\u003e\n\u003cli\u003eAnyone who violates the provisions of transferring or disclosing personal data outside the Kingdom shall be punished by imprisonment for a period not exceeding (one year) and a fine not exceeding (one million) riyals, or one of these two penalties.\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp\u003e\u0026nbsp;\u003c/p\u003e\n\u003cp\u003eWhile there is no specific provision of the law, and without prejudice to any more severe penalty stipulated by another law, any person of a special or legal nature - covered by the provisions of the law - who violates any of the provisions of the law or regulations - shall be punished by a warning or a fine not exceeding five million riyals. The fine penalty may be doubled in the event of a repeated violation, even if it exceeds its maximum limit if it does not exceed twice this limit.\u003c/p\u003e\n\u003cp\u003eThe Public Prosecution is responsible for investigating and prosecuting before the competent court regarding these violations. The competent court shall consider the cases arising from the application of this article and impose the penalties stipulated.\u003c/p\u003e\n\u003cp\u003eThe committee (or more) whose members are not less than (three), one of whom is named the chairman, including a Sharia or legal advisor, shall be responsible for considering the violations and imposing the warning penalty or fine stipulated herein, according to the type of violation committed, its seriousness and extent of its impact, provided that the decision of the head of the competent authority shall issue the rules of work of the committee, which shall determine the wages of its members. Any person against the decision of the committee has the right to appeal before a competent court.\u003c/p\u003e\n\u003cp\u003eWithout prejudice to the provisions of this law, the Saudi Press Agency shall hold any of its employees - disciplinary - accountable in the event of their violation of any of the provisions of the law and regulations, in accordance with the provisions and procedures of accountability and discipline stipulated in the law.\u003c/p\u003e\n\u003cp\u003eWithout prejudice to the penalty imposed In law, anyone who has suffered damage due to the commission of any of the violations stipulated in the law or regulations has the right to claim compensation before the competent court for material or moral damages commensurate with the extent of the damage.\u003c/p\u003e\n\u003cp\u003eMoreover, any person who has started a job in processing personal data is obligated to maintain the secrets related to the data even after the end of his job or contractual relationship.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e\u0026nbsp;\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eDisclaimer\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003eThis privacy and data protection policy applies to the Saudi Press Agency's electronic portal only. You must read the privacy and data protection policy carefully when transferring to another website through this portal.\u003c/p\u003e\n\u003cp\u003eThe provisions and procedures of the law do not prejudice any provision that grants the right of the owner of personal data or decides to protect it better, stipulated in another system or international agreement to which the Kingdom is a party.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eNo liability:\u003c/strong\u003e The portal has been prepared to comply with the current regulations in the Kingdom of Saudi Arabia. Under this decision, the Saudi Press Agency cannot guarantee:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eAccuracy and reliability of information\u003c/li\u003e\n\u003cli\u003eResponse to external attack or hacking External.\u003c/li\u003e\n\u003cli\u003eSustainability or effectiveness\u003c/li\u003e\n\u003cli\u003ePortal content suitability\u003c/li\u003e\n\u003cli\u003eNeither the Portal nor the server will contain viruses or other harmful elements.\u003c/li\u003e\n\u003cli\u003eNeither the Saudi Press Agency nor any other government entity shall be held legally responsible for any direct or indirect loss or damage that may result from the use of the Portal.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u0026nbsp;\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eUse at your own risk:\u003c/strong\u003e The Portal contains links to other websites that are not under the supervision of the Saudi Press Agency and therefore is not responsible for the content of those websites. Any risks arising from browsing the sites through the links provided on the Portal are the responsibility of the user.\u003c/p\u003e\n\u003cp\u003eThe Portal contains links to other websites or portals that may attempt to protect information and privacy using tools different from those used by the Portal; therefore, we are not responsible for the content or privacy protection methods used. We advise users to review the privacy policies of these sites.\u003c/p\u003e\n\u003cp\u003eSome of the sites use cookies; These files give users full access to websites. If desired, cookies can be used to remember passwords and simplify access to the website. Cookies are stored on the computer's hard drive if accepted and encoded.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e\u0026nbsp;\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eLimitations of Liability:\u003c/strong\u003e Users hereby acknowledge their awareness that online communications can be spied on or hacked by third parties. As confirmed, users understand that the portal will not change the information provided by official government agencies, in addition, all requests and administrative procedures can also be submitted online directly and personally executed.\u003c/p\u003e\n\u003cp\u003eThe portal does not bear any responsibility for any loss or damage that users may suffer from using and visiting the portal, including because of any information, statement or offer advertised.\u003c/p\u003e\n\u003cp\u003eFurthermore, the portal is not responsible for any problems that may arise in accessing the Internet and any damage to machines or software, and cannot be held accountable for any misconduct or malicious comment made by other users who have logged in.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e\u0026nbsp;\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eProtection against viruses:\u003c/strong\u003e Users must make use of appropriate anti-virus software When attempting to download any content from the portal. We are not responsible for any loss or damage to the user's data or computer that may arise while using this portal or any of its content.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e\u0026nbsp;\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eDisclaimer:\u003c/strong\u003e \u0026nbsp;The Saudi Press Agency's electronic portal \u0026nbsp;and all its services, information sources and other materials are for personal use without acknowledgement or warranty. The portal is not responsible for errors or violations that may arise due to the use of its content or links, whether known or unknown.\u003c/p\u003e\n\u003cp\u003eAny communication or information sent by users from the portal is not in the possession of the sender and is not guaranteed in terms of privacy. In addition, any interactive use by users of the portal does not guarantee any rights, licenses or privileges.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e\u0026nbsp;\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eIndemnifications:\u003c/strong\u003e Users hereby agree not to act against the Saudi Press Agency or its managers, including all departments, employees or authorized agents responsible for managing or updating the Saudi Press Agency portal. This clause is considered a legal exemption from obligation
