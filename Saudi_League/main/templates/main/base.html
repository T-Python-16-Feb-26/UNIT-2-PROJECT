{% load static %}
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>موقع الرياضات السعودية - {% block title %}{% endblock %}</title>
    
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;500;700;900&display=swap" rel="stylesheet">
</head>
<body>

    <div class="top-section">
        <header class="navbar-header">
            <div class="my-container header-flex">
                <div class="my-logo">
                    <a href="/">سعودي<span>سبورت</span></a>
                </div>
                
                <nav class="main-nav">
                    <ul>
                        <li><a href="/" class="active">الرئيسية</a></li>
                        <li><a href="#">كرة القدم</a></li>
                        <li><a href="#">الفعاليات</a></li>
                        <li><a href="#">الرياضة النسائية</a></li>
                        <li><a href="#">رؤية 2030</a></li>
                        <li><a href="#">تواصل معنا</a></li>
                    </ul>
                </nav>

                <div class="header-button">
                    <a href="#" class="join-btn">سجل الآن</a>
                </div>
            </div>
        </header>

        <div class="hero-box">
            <div class="my-container">
                {% block hero %}{% endblock %}
            </div>
        </div>
    </div>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer class="main-footer">
        <div class="my-container">
            <p></p>
        </div>
    </footer>

    
</body>
</html>
