{% load static %}
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إرث</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

<header class="site-header">
    <div class="header-inner">
        <a href="/" class="brand">إرث</a>

        <div class="explore-dropdown">
            <button class="explore-btn" type="button">استكشف ▾</button>
            <div class="explore-menu">

                <a href="/breeds/">موسوعة سلالات الإبل</a>

                <a href="/future/">دعم رؤية 2030 لمستقبل الإبل</a>

        </div>

        <div class="header-actions">
            <a href="/login/" class="header-btn">تسجيل الدخول</a>
            <button class="header-btn" type="button" onclick="toggleMode()">☾</button>
        </div>
    </div>
</header>

<main>
    {% block content %}{% endblock %}
</main>

<footer class="site-footer">
    <div class="footer-inner">
        <p>إرث — الإبل إرثنا وهويتنا</p>
        <div class="footer-links">
            <a href="/about/">من نحن</a>
            <a href="/contact/">تواصل معنا</a>

<script src="{% static 'js/main.js' %}"></script>
